<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Catégories admin — Bola's</title>
</head>
<body class="bolas-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container-fluid">
  <div class="row">
    <div th:replace="~{fragments/admin-sidebar :: sidebar(active='categories')}"></div>
    <main class="col-12 col-md-9 col-lg-10 ms-sm-auto px-4 py-4">
      <h1 class="h3 fw-semibold mb-4" style="color: #8B5E3C;" th:text="'Gestion des catégories'">Catégories</h1>

      <div th:if="${flashError}" class="alert alert-danger" role="alert" th:text="${flashError}"></div>
      <div th:if="${flashOk}" class="alert alert-success" role="alert" th:text="${flashOk}"></div>

      <div class="admin-card p-4 mb-4" style="max-width: 640px;">
        <h2 class="h6 fw-bold mb-3" style="color: #8B5E3C;" th:text="${category != null and category.id != null} ? 'Modifier une catégorie' : 'Ajouter une catégorie'">Ajouter</h2>
        <form th:action="@{/admin/categories}"
              th:object="${category}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" th:field="*{id}"/>
          <div class="mb-3">
            <label for="catName" class="form-label" th:text="'Nom'">Nom</label>
            <input type="text" class="form-control" id="catName" th:field="*{name}" required maxlength="120"/>
          </div>
          <div class="mb-3">
            <label for="catDesc" class="form-label" th:text="'Description'">Description</label>
            <textarea class="form-control" id="catDesc" th:field="*{description}" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label for="catImg" class="form-label">URL image (pour l'overlay catégorie)</label>
            <input type="text" class="form-control" id="catImg" th:field="*{imageUrl}" maxlength="2000"
                   placeholder="https://i.pinimg.com/... ou lien pin.it / Pinterest"/>
          </div>
          <button type="submit" class="btn btn-hero-solid" th:text="'Enregistrer'">Enregistrer</button>
        </form>
      </div>

      <div class="table-responsive admin-card">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
          <tr>
            <th th:text="'Nom'">Nom</th>
            <th th:text="'Description'">Desc</th>
            <th></th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="c : ${categories}">
            <td th:text="${c.name}">—</td>
            <td th:text="${c.description != null ? #strings.abbreviate(c.description, 80) : ''}">—</td>
            <td class="text-end">
              <a th:href="@{/admin/categories/{id}/edit(id=${c.id})}" class="btn btn-sm btn-outline-secondary" th:text="'Modifier'">Modifier</a>
              <form th:action="@{/admin/categories/{id}/delete(id=${c.id})}" method="post" class="d-inline" onsubmit="return confirm('Supprimer cette catégorie ?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline-danger" th:text="'Supprimer'">Supprimer</button>
              </form>
            </td>
          </tr>
          <tr th:if="${categories == null or categories.isEmpty()}">
            <td colspan="3" class="text-muted p-4" th:text="'Aucune catégorie.'">—</td>
          </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
