<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Produit — Bola's</title>
</head>
<body class="bolas-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container-fluid">
  <div class="row">
    <div th:replace="~{fragments/admin-sidebar :: sidebar(active='products')}"></div>
    <main class="col-12 col-md-9 col-lg-10 ms-sm-auto px-4 py-4">
      <h1 class="h3 fw-bold mb-4" style="color: #5D3A1A;" th:text="${product.id != null} ? 'Modifier le produit' : 'Nouveau produit'">Produit</h1>

      <div th:if="${flashError}" class="alert alert-danger" style="max-width: 800px;" role="alert" th:text="${flashError}"></div>

      <div class="admin-card p-4" style="max-width: 800px;">
        <form th:action="@{/admin/products}"
              th:object="${product}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate id="productForm">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" th:field="*{id}"/>

          <div class="mb-3">
            <label for="name" class="form-label">Nom</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required maxlength="200"/>
            <div class="invalid-feedback">Le nom est obligatoire.</div>
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="4"></textarea>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-4">
              <label for="priceCfa" class="form-label">Prix catalogue (CFA)</label>
              <input type="number" class="form-control" id="priceCfa" th:field="*{priceCfa}" min="0" required step="1"/>
            </div>
            <div class="col-md-4">
              <label for="promoPriceCfa" class="form-label">Prix promo (CFA)</label>
              <input type="number" class="form-control" id="promoPriceCfa" th:field="*{promoPriceCfa}" min="0" step="1"
                     placeholder="Optionnel"/>
              <div id="promoFeedback" class="invalid-feedback">Le prix promo doit être inférieur au prix catalogue.</div>
              <div class="form-text small">Laisser vide si pas de promotion.</div>
            </div>
            <div class="col-md-4">
              <label for="category" class="form-label">Catégorie</label>
              <select class="form-select" id="category" th:field="*{category.id}" required>
                <option value="">Choisir…</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}">Cat</option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label for="imageFile" class="form-label">Photo depuis votre PC</label>
            <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/jpeg,image/png,image/webp"/>
            <div class="form-text small">JPG, PNG ou WebP — max 5 Mo.</div>
          </div>

          <div class="mb-3" th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}">
            <p class="small text-muted mb-1">Image actuelle</p>
            <img th:src="${product.imageUrl}" alt="" class="img-thumbnail" style="max-height:120px;"/>
          </div>

          <div class="mb-3">
            <label for="imageUrl" class="form-label">Ou URL d'image (optionnel)</label>
            <input type="url" class="form-control" id="imageUrl" th:field="*{imageUrl}" placeholder="https://"/>
          </div>

          <div class="mb-3">
            <label for="videoFile" class="form-label">Vidéo du produit (depuis votre PC)</label>
            <input type="file" class="form-control" id="videoFile" name="videoFile"
                   accept="video/mp4,video/quicktime,video/webm,video/x-msvideo"/>
            <div class="form-text small">MP4, MOV, WebM — max 100 Mo.</div>
          </div>

          <div class="mb-3" th:if="${product.videoUrl != null and !product.videoUrl.isEmpty()}">
            <p class="small text-muted mb-1">Vidéo actuelle</p>
            <video th:src="${product.videoUrl}" controls muted
                   style="max-width:100%;max-height:200px;border-radius:8px;"></video>
            <div class="form-check mt-2">
              <input type="checkbox" class="form-check-input" id="removeVideo" name="removeVideo" value="true"/>
              <label class="form-check-label text-danger small" for="removeVideo">Supprimer la vidéo</label>
            </div>
          </div>

          <hr class="my-4">

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="available" th:field="*{available}"/>
            <label class="form-check-label" for="available">Produit disponible à la vente</label>
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="deliveryAvailable" th:field="*{deliveryAvailable}"/>
            <label class="form-check-label" for="deliveryAvailable">Livraison à domicile disponible</label>
          </div>

          <div class="mb-3">
            <label for="deliveryPriceCfa" class="form-label">Prix livraison (CFA)</label>
            <input type="number" class="form-control" id="deliveryPriceCfa" th:field="*{deliveryPriceCfa}" min="0" step="1"/>
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="featured" th:field="*{featured}"/>
            <label class="form-check-label" for="featured">Mettre en vedette (page d'accueil)</label>
          </div>

          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="limitedStock" th:field="*{limitedStock}"/>
            <label class="form-check-label" for="limitedStock">
              <span class="badge bg-danger me-1">Stock limité</span>
              Afficher le badge "Stock limité"
            </label>
          </div>

          <div class="pt-3 border-top">
            <button type="submit" class="btn btn-hero-solid px-4">Enregistrer</button>
            <a th:href="@{/admin/products}" class="btn btn-outline-secondary ms-2">Annuler</a>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>

<script>
  // Validation personnalisée pour le prix promo
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('productForm');
    const priceInput = document.getElementById('priceCfa');
    const promoInput = document.getElementById('promoPriceCfa');

    form.addEventListener('submit', function (event) {
      const price = parseFloat(priceInput.value);
      const promo = parseFloat(promoInput.value);

      if (promo && promo >= price) {
        event.preventDefault();
        event.stopPropagation();
        promoInput.classList.add('is-invalid');
      } else {
        promoInput.classList.remove('is-invalid');
      }

      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
      }
      form.classList.add('was-validated');
    }, false);
  });
</script>
</body>
</html>
