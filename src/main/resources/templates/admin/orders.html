<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Commandes — Bola's</title>
</head>
<body class="bolas-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container-fluid">
  <div class="row">
    <div th:replace="~{fragments/admin-sidebar :: sidebar(active='orders')}"></div>
    <main class="col-12 col-md-9 col-lg-10 ms-sm-auto px-4 py-4">
      <h1 class="h3 fw-semibold mb-4" style="color: #8B5E3C;" th:text="'Gestion des commandes'">Commandes</h1>

      <div th:if="${flashOk}" class="alert alert-success mb-3" role="alert" th:text="${flashOk}"></div>
      <div th:if="${flashError}" class="alert alert-danger mb-3" role="alert" th:text="${flashError}"></div>

      <!-- Formulaire nouvelle commande -->
      <div class="admin-card p-4 mb-4">
        <h2 class="h6 fw-bold mb-3" style="color:#8B5E3C;">
          <i class="bi bi-plus-circle me-1"></i>Créer une commande manuellement (depuis WhatsApp)
        </h2>
        <form th:action="@{/admin/orders/new}" method="post" th:object="${newOrder}" class="row g-3">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="col-md-4">
            <label class="form-label small fw-semibold">Nom du client</label>
            <input type="text" class="form-control" th:field="*{customerName}" required maxlength="200" placeholder="ex. Awa K."/>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold">Téléphone</label>
            <input type="text" class="form-control" th:field="*{customerPhone}" required maxlength="40" placeholder="ex. 22890123456"/>
          </div>
          <div class="col-md-5">
            <label class="form-label small fw-semibold">Adresse</label>
            <input type="text" class="form-control" th:field="*{customerAddress}" maxlength="500" placeholder="ex. Lomé, Adidogomé"/>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold">Produit commandé</label>
            <select class="form-select" name="productId">
              <option value="">— Choisir (optionnel) —</option>
              <option th:each="p : ${products}" th:value="${p.id}"
                      th:text="${p.name} + ' — ' + ${p.effectivePriceCfa} + ' CFA'">Produit</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Montant total (CFA)</label>
            <input type="number" class="form-control" th:field="*{totalAmountCfa}" required min="0" step="1"/>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Frais livraison (CFA)</label>
            <input type="number" class="form-control" th:field="*{deliveryFeeCfa}" min="0" step="1" value="0"/>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Option</label>
            <select class="form-select" th:field="*{deliveryOption}">
              <option value="HOME">Livraison domicile</option>
              <option value="PICKUP">Retrait boutique</option>
            </select>
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button type="submit" class="btn btn-hero-solid w-100">
              <i class="bi bi-plus me-1"></i>Créer la commande
            </button>
          </div>
        </form>
      </div>

      <div class="table-responsive admin-card">
        <table class="table table-hover align-middle mb-0 small">
          <thead class="table-light">
          <tr>
            <th th:text="'N° suivi'">N°</th>
            <th th:text="'Client'">Client</th>
            <th th:text="'Téléphone'">Tel</th>
            <th th:text="'Adresse'">Adr</th>
            <th th:text="'Livraison'">Liv</th>
            <th th:text="'Montant'">€</th>
            <th th:text="'Statut'">St</th>
            <th></th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="o : ${orders}">
            <td th:text="${o.trackingNumber}">—</td>
            <td th:text="${o.customerName}">—</td>
            <td th:text="${o.customerPhone}">—</td>
            <td th:text="${o.customerAddress != null ? #strings.abbreviate(o.customerAddress, 40) : '—'}">—</td>
            <td>
              <span th:if="${o.deliveryOption.name() == 'HOME'}" th:text="'Domicile'">Domicile</span>
              <span th:if="${o.deliveryOption.name() == 'PICKUP'}" th:text="'Retrait'">Retrait</span>
            </td>
            <td th:text="${o.totalAmountCfa} + ' CFA'">0</td>
            <td>
              <form th:action="@{/admin/orders/{id}/status(id=${o.id})}" method="post" class="d-flex flex-column gap-1">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select name="status" class="form-select form-select-sm" onchange="this.form.submit()">
                  <option value="PENDING" th:selected="${o.status.name() == 'PENDING'}" th:text="'Reçue / en attente'">Reçue</option>
                  <option value="IN_DELIVERY" th:selected="${o.status.name() == 'IN_DELIVERY'}" th:text="'En livraison'">Livraison</option>
                  <option value="DELIVERED" th:selected="${o.status.name() == 'DELIVERED'}" th:text="'Livrée'">Livrée</option>
                  <option value="CANCELLED" th:selected="${o.status.name() == 'CANCELLED'}" th:text="'Annulée'">Annulée</option>
                </select>
              </form>
            </td>
            <td class="text-end">
              <form th:action="@{/admin/orders/{id}/delete(id=${o.id})}" method="post" class="m-0"
                    onsubmit="return confirm('Supprimer cette commande ?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline-danger" th:text="'Supprimer'">Supprimer</button>
              </form>
            </td>
          </tr>
          <tr th:if="${orders == null or orders.isEmpty()}">
            <td colspan="8" class="text-muted p-4" th:text="'Aucune commande.'">—</td>
          </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
