<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Pays — Admin BOLA</title>
</head>
<body class="bolas-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container-fluid">
  <div class="row">
    <div th:replace="~{fragments/admin-sidebar :: sidebar(active='countries')}"></div>
    <main class="col-12 col-md-9 col-lg-10 ms-sm-auto px-4 py-4">

      <h1 class="h3 fw-semibold mb-4" style="color:#8B5E3C;">
        <i class="bi bi-globe2 me-2"></i>Pays actifs sur BOLA
      </h1>

      <div th:if="${flashOk}" class="alert alert-success" th:text="${flashOk}"></div>

      <!-- Ajouter un pays -->
      <div class="admin-card p-4 mb-4" style="max-width:500px;">
        <h2 class="h6 fw-bold mb-3" style="color:#8B5E3C;">
          <i class="bi bi-plus-circle me-1"></i>Ajouter un pays
        </h2>
        <form th:action="@{/admin/countries}" method="post" class="row g-3">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="col-md-3">
            <label class="form-label small fw-semibold">Code ISO *</label>
            <input type="text" class="form-control" name="code" required maxlength="4"
                   placeholder="TG" style="text-transform:uppercase;"/>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold">Nom *</label>
            <input type="text" class="form-control" name="name" required maxlength="100"
                   placeholder="Togo"/>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Drapeau</label>
            <input type="text" class="form-control" name="flag" maxlength="10"
                   placeholder="🇹🇬"/>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold">Taxe douanière (%)</label>
            <input type="number" class="form-control" name="customsTaxPercent"
                   min="0" max="100" value="0" placeholder="0"/>
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-hero-solid w-100">
              <i class="bi bi-plus"></i>
            </button>
          </div>
        </form>
      </div>

      <!-- Liste des pays -->
      <div class="admin-card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0 small">
            <thead class="table-light">
              <tr>
                <th>Drapeau</th>
                <th>Code</th>
                <th>Nom</th>
                <th>Taxe douanière</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="c : ${countries}">
                <td th:text="${c.flag ?: '🌍'}">🌍</td>
                <td><code th:text="${c.code}">TG</code></td>
                <td th:text="${c.name}">Togo</td>
                <td>
                  <span th:if="${c.customsTaxPercent > 0}"
                        class="badge bg-warning text-dark"
                        th:text="${c.customsTaxPercent} + '%'">0%</span>
                  <span th:if="${c.customsTaxPercent == 0}" class="text-muted small">Aucune</span>
                </td>
                <td>
                  <span th:if="${c.active}" class="badge bg-success">Actif</span>
                  <span th:if="${!c.active}" class="badge bg-secondary">Inactif</span>
                </td>
                <td>
                  <div class="d-flex gap-1">
                    <form th:action="@{/admin/countries/{id}/toggle(id=${c.id})}" method="post" class="m-0">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-sm btn-outline-secondary"
                              th:text="${c.active} ? 'Désactiver' : 'Activer'">Toggle</button>
                    </form>
                    <form th:action="@{/admin/countries/{id}/delete(id=${c.id})}" method="post" class="m-0"
                          onsubmit="return confirm('Supprimer ce pays ?')">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
              <tr th:if="${countries.isEmpty()}">
                <td colspan="5" class="text-muted text-center p-3">Aucun pays configuré.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
