<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Produits admin — Bola's</title>
</head>
<body class="bolas-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container-fluid">
  <div class="row">
    <div th:replace="~{fragments/admin-sidebar :: sidebar(active='products')}"></div>
    <main class="col-12 col-md-9 col-lg-10 ms-sm-auto px-4 py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
        <h1 class="h3 fw-semibold mb-0" style="color: #8B5E3C;" th:text="'Gestion des produits'">Produits</h1>
        <a th:href="@{/admin/products/new}" class="btn btn-hero-solid" th:text="'Ajouter un produit'">Ajouter</a>
      </div>

      <div th:if="${flashError}" class="alert alert-danger mb-3" role="alert" th:text="${flashError}"></div>
      <div th:if="${flashOk}" class="alert alert-success mb-3" role="alert" th:text="${flashOk}"></div>

      <div class="table-responsive admin-card">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
          <tr>
            <th th:text="'Nom'">Nom</th>
            <th th:text="'Catégorie'">Cat</th>
            <th th:text="'Prix'">Prix</th>
            <th th:text="'Promo'">Promo</th>
            <th th:text="'Dispo'">Dispo</th>
            <th th:text="'Livraison'">Liv</th>
            <th>Stock</th>
            <th></th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="p : ${products}">
            <td th:text="${p.name}">—</td>
            <td th:text="${p.category.name}">—</td>
            <td>
              <span th:text="${p.priceCfa}">0</span>
              <span th:if="${p.onPromotion}" class="text-muted small"> → </span>
              <span th:if="${p.onPromotion}" class="fw-semibold text-danger" th:text="${p.effectivePriceCfa}">0</span>
            </td>
            <td>
              <span th:if="${p.onPromotion}" class="badge bg-danger" th:text="'PROMO'">PROMO</span>
              <span th:if="${!p.onPromotion}" class="text-muted">—</span>
            </td>
            <td>
              <span th:if="${p.available}" class="badge bg-success" th:text="'Oui'">Oui</span>
              <span th:if="${!p.available}" class="badge bg-secondary" th:text="'Non'">Non</span>
            </td>
            <td>
              <span th:if="${p.deliveryAvailable}" class="badge" style="background:#8B5E3C;color:#fff;" th:text="'Oui'">Oui</span>
              <span th:if="${!p.deliveryAvailable}" class="badge bg-secondary" th:text="'Non'">Non</span>
            </td>
            <td>
              <span th:if="${p.limitedStock}" class="badge bg-danger">🔥 Limité</span>
              <span th:if="${!p.limitedStock}" class="text-muted small">—</span>
            </td>
            <td class="text-end">
              <a th:href="@{/admin/products/{id}/edit(id=${p.id})}" class="btn btn-sm btn-outline-secondary" th:text="'Modifier'">Modifier</a>
              <form th:action="@{/admin/products/{id}/delete(id=${p.id})}" method="post" class="d-inline" onsubmit="return confirm('Supprimer ce produit ?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline-danger" th:text="'Supprimer'">Supprimer</button>
              </form>
            </td>
          </tr>
          <tr th:if="${products == null or products.isEmpty()}">
            <td colspan="8" class="text-muted p-4" th:text="'Aucun produit.'">—</td>
          </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
