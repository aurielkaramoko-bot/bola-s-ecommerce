<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Vendeurs — Bola's</title>
</head>
<body class="bolas-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container-fluid">
  <div class="row">
    <div th:replace="~{fragments/admin-sidebar :: sidebar(active='vendors')}"></div>
    <main class="col-12 col-md-9 col-lg-10 ms-sm-auto px-4 py-4">
      <h1 class="h3 fw-semibold mb-4" style="color:#8B5E3C;">Gestion des vendeurs</h1>

      <div th:if="${flashOk}" class="alert alert-success" th:text="${flashOk}"></div>
      <div th:if="${flashError}" class="alert alert-danger" th:text="${flashError}"></div>

      <!-- Créer un vendeur -->
      <div class="admin-card p-4 mb-4" style="max-width:500px;">
        <h2 class="h6 fw-bold mb-3" style="color:#8B5E3C;">Ajouter un vendeur</h2>
        <form th:action="@{/admin/vendors}" method="post" class="row g-3">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="col-12">
            <label class="form-label small fw-semibold">Nom d'utilisateur</label>
            <input type="text" class="form-control" name="username" required maxlength="100"/>
          </div>
          <div class="col-12">
            <label class="form-label small fw-semibold">Mot de passe</label>
            <input type="password" class="form-control" name="password" required minlength="6"/>
          </div>
          <div class="col-12">
            <label class="form-label small fw-semibold">Téléphone WhatsApp</label>
            <input type="text" class="form-control" name="phone" required maxlength="40"
                   placeholder="ex. 22890123456"/>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-hero-solid">Créer le vendeur</button>
          </div>
        </form>
      </div>

      <!-- Liste vendeurs -->
      <div class="admin-card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0 small">
            <thead class="table-light">
              <tr><th>Nom</th><th>Téléphone</th><th>Statut</th><th></th></tr>
            </thead>
            <tbody>
              <tr th:each="v : ${vendors}">
                <td th:text="${v.username}">—</td>
                <td th:text="${v.phone}">—</td>
                <td>
                  <span th:if="${v.active}" class="badge bg-success">Actif</span>
                  <span th:if="${!v.active}" class="badge bg-secondary">Désactivé</span>
                </td>
                <td>
                  <form th:action="@{/admin/vendors/{id}/toggle(id=${v.id})}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-secondary"
                            th:text="${v.active} ? 'Désactiver' : 'Activer'">Toggle</button>
                  </form>
                </td>
              </tr>
              <tr th:if="${vendors.isEmpty()}">
                <td colspan="4" class="text-muted p-3">Aucun vendeur créé.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
