<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Vendeurs — Admin BOLA</title>
</head>
<body class="bolas-body">
<nav th:replace="~{fragments/header :: navbar}"></nav>
<div class="container-fluid">
  <div class="row">
    <div th:replace="~{fragments/admin-sidebar :: sidebar(active='vendors')}"></div>
    <main class="col-12 col-md-9 col-lg-10 ms-sm-auto px-4 py-4">

      <h1 class="h3 fw-semibold mb-4" style="color:#8B5E3C;">
        <i class="bi bi-shop me-2"></i>Gestion des vendeurs
      </h1>

      <div th:if="${flashOk}" class="alert alert-success" th:text="${flashOk}"></div>
      <div th:if="${flashError}" class="alert alert-danger" th:text="${flashError}"></div>

      <!-- ===== DEMANDES EN ATTENTE ===== -->
      <div th:if="${pendingVendors != null and !pendingVendors.isEmpty()}" class="mb-4">
        <h2 class="h5 fw-semibold mb-3" style="color:#8B5E3C;">
          <i class="bi bi-hourglass-split me-2 text-warning"></i>Demandes en attente
          <span class="badge bg-warning text-dark ms-2"
                th:text="${pendingVendors.size()}">0</span>
        </h2>
        <div class="admin-card">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 small">
              <thead class="table-light">
                <tr>
                  <th>Boutique</th>
                  <th>Identifiant</th>
                  <th>Téléphone</th>
                  <th>Email</th>
                  <th>Description</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="v : ${pendingVendors}">
                  <td>
                    <strong th:text="${v.shopName ?: v.username}">—</strong>
                  </td>
                  <td th:text="${v.username}">—</td>
                  <td>
                    <a th:href="${'https://wa.me/' + v.phone}" target="_blank"
                       class="text-decoration-none">
                      <i class="bi bi-whatsapp text-success me-1"></i>
                      <span th:text="${v.phone}">—</span>
                    </a>
                  </td>
                  <td th:text="${v.email ?: '—'}">—</td>
                  <td class="text-muted" style="max-width:200px;">
                    <span th:text="${v.shopDescription ?: '—'}"
                          style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;display:block;">—</span>
                  </td>
                  <td>
                    <div class="d-flex gap-1">
                      <!-- Approuver -->
                      <form th:action="@{/admin/vendors/{id}/approve(id=${v.id})}"
                            method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-success">
                          <i class="bi bi-check-circle me-1"></i>Approuver
                        </button>
                      </form>
                      <!-- Supprimer la demande -->
                      <form th:action="@{/admin/vendors/{id}/delete(id=${v.id})}"
                            method="post" class="m-0"
                            onsubmit="return confirm('Rejeter cette demande ?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger">
                          <i class="bi bi-x-circle me-1"></i>Rejeter
                        </button>
                      </form>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ===== CRÉER UN VENDEUR DIRECTEMENT ===== -->
      <div class="admin-card p-4 mb-4" style="max-width:580px;">
        <h2 class="h6 fw-bold mb-3" style="color:#8B5E3C;">
          <i class="bi bi-person-plus me-2"></i>Créer un vendeur directement
        </h2>
        <form th:action="@{/admin/vendors}" method="post" class="row g-3">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <div class="col-md-6">
            <label class="form-label small fw-semibold">Nom de la boutique</label>
            <input type="text" class="form-control" name="shopName" maxlength="150"
                   placeholder="ex. Mode Africaine"/>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Identifiant *</label>
            <input type="text" class="form-control" name="username" required maxlength="100"/>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Mot de passe *</label>
            <input type="password" class="form-control" name="password" required minlength="6"/>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Téléphone WhatsApp *</label>
            <input type="text" class="form-control" name="phone" required maxlength="40"
                   placeholder="ex. 22890123456"/>
          </div>
          <div class="col-12">
            <label class="form-label small fw-semibold">Email</label>
            <input type="email" class="form-control" name="email" maxlength="200"/>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-hero-solid">
              <i class="bi bi-person-plus me-1"></i>Créer et activer
            </button>
          </div>
        </form>
      </div>

      <!-- ===== LISTE TOUS LES VENDEURS ===== -->
      <h2 class="h5 fw-semibold mb-3" style="color:#8B5E3C;">
        <i class="bi bi-list-ul me-2"></i>Tous les vendeurs
        <span class="badge bg-secondary ms-2" th:text="${activeVendors?.size() ?: 0}">0</span>
      </h2>
      <div class="admin-card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0 small">
            <thead class="table-light">
              <tr>
                <th>Boutique</th>
                <th>Identifiant</th>
                <th>Téléphone</th>
                <th>Plan</th>
                <th>Statut</th>
                <th>Produits</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="v : ${activeVendors}">
                <td>
                  <strong th:text="${v.shopName ?: v.username}">—</strong>
                  <div class="small text-muted" th:if="${v.email != null}"
                       th:text="${v.email}">—</div>
                </td>
                <td th:text="${v.username}">—</td>
                <td>
                  <a th:href="${'https://wa.me/' + v.phone}" target="_blank"
                     class="text-decoration-none">
                    <i class="bi bi-whatsapp text-success me-1"></i>
                    <span th:text="${v.phone}">—</span>
                  </a>
                </td>
                <td>
                  <span class="badge"
                        th:classappend="${v.plan?.name() == 'PRO'} ? 'bg-warning text-dark' : 'bg-secondary'"
                        th:text="${v.plan?.name() == 'PRO'} ? '⭐ Pro' : 'Gratuit'">Gratuit</span>
                </td>
                <td>
                  <span th:if="${v.vendorStatus?.name() == 'ACTIVE'}" class="badge bg-success">Actif</span>
                  <span th:if="${v.vendorStatus?.name() == 'SUSPENDED'}" class="badge bg-danger">Suspendu</span>
                  <span th:if="${v.vendorStatus == null or v.vendorStatus?.name() == 'PENDING'}" class="badge bg-warning text-dark">En attente</span>
                </td>
                <td>
                  <a th:href="@{/admin/products}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-box-seam me-1"></i>Voir
                  </a>
                </td>
                <td>
                  <div class="d-flex gap-1 flex-wrap">
                    <!-- Approuver si non actif -->
                    <form th:if="${!v.active}"
                          th:action="@{/admin/vendors/{id}/approve(id=${v.id})}"
                          method="post" class="m-0">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-sm btn-success">Activer</button>
                    </form>
                    <!-- Suspendre si actif -->
                    <form th:if="${v.active}"
                          th:action="@{/admin/vendors/{id}/suspend(id=${v.id})}"
                          method="post" class="m-0">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-sm btn-outline-warning">Suspendre</button>
                    </form>
                    <!-- Supprimer -->
                    <form th:action="@{/admin/vendors/{id}/delete(id=${v.id})}"
                          method="post" class="m-0"
                          onsubmit="return confirm('Supprimer définitivement ce vendeur ?')">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
              <tr th:if="${activeVendors == null or activeVendors.isEmpty()}">
                <td colspan="7" class="text-muted p-3 text-center">Aucun vendeur actif.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
