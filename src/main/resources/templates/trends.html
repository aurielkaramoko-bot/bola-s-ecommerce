<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Tendances — BOLA</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-5 flex-grow-1">
  <h1 class="h2 section-title mb-1">
    🔥 Tendances du moment
  </h1>
  <p class="section-subtitle mb-4">Les produits qui font le buzz sur BOLA en ce moment</p>

  <div class="row g-3" th:if="${trendProducts != null and !trendProducts.isEmpty()}">
    <div class="col-6 col-md-4 col-lg-3" th:each="p : ${trendProducts}">
      <div style="position:relative;">
        <span style="position:absolute;top:8px;left:8px;z-index:10;background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;font-size:.7rem;padding:3px 8px;border-radius:999px;font-weight:700;">
          🔥 TREND
        </span>
        <th:block th:replace="~{fragments/product-card :: card(p=${p})}"></th:block>
      </div>
    </div>
  </div>

  <div th:if="${trendProducts == null or trendProducts.isEmpty()}" class="text-center py-5 text-muted">
    <i class="bi bi-fire fs-1 d-block mb-3 opacity-25"></i>
    <p>Aucun produit en tendance pour l'instant.</p>
    <p class="small">Les vendeurs PRO et PREMIUM peuvent marquer leurs produits comme Tendance.</p>
  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
