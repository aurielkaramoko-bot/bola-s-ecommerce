<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Connexion — Bola's</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-5 flex-grow-1">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="p-4 p-md-5 rounded-3 border admin-card shadow-sm">
        <h1 class="h3 fw-semibold text-center mb-4" style="color: #8B5E3C;" th:text="|Connexion Bola's|">Connexion</h1>

        <div th:if="${param.error}" class="alert alert-danger small" role="alert" th:text="'Identifiants incorrects ou compte temporairement verrouillé.'">
          Erreur
        </div>
        <div th:if="${param.logout}" class="alert alert-success small" role="alert" th:text="'Vous avez été déconnecté.'">
          OK
        </div>

        <form th:action="@{/admin/login}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="mb-3">
            <label for="username" class="form-label" th:text="|Nom d'utilisateur|">User</label>
            <input type="text" class="form-control border-secondary-subtle" id="username" name="username" autocomplete="username" required/>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label" th:text="'Mot de passe'">Pass</label>
            <input type="password" class="form-control border-secondary-subtle" id="password" name="password" autocomplete="current-password" required/>
          </div>
          <button type="submit" class="btn btn-hero-solid w-100 py-2" th:text="'Se connecter'">OK</button>
        </form>
      </div>
      <p class="text-center mt-3 small text-muted">
        <a th:href="@{/}" class="text-decoration-none" style="color: #8B5E3C;" th:text="|Retour à l'accueil|">Retour</a>
      </p>
    </div>
  </div>
</main>

<div th:replace="~{fragments/popular-section :: popular}"></div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
