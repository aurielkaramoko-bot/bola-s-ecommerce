<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Produit — BOLA</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-5 flex-grow-1" th:if="${product != null}">

  <nav aria-label="Fil d'Ariane" class="mb-4 small">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a th:href="@{/}" style="color:var(--bolas-accent)">Accueil</a></li>
      <li class="breadcrumb-item"><a th:href="@{/products}" style="color:var(--bolas-accent)">Produits</a></li>
      <li class="breadcrumb-item active" aria-current="page" th:text="${product.name}">Produit</li>
    </ol>
  </nav>

  <div class="row g-5 align-items-start">

    <div class="col-lg-6">
      <div th:if="${product.videoUrl != null and !product.videoUrl.isEmpty()}"
           class="product-detail-photo">
        <video th:src="${product.videoUrl}" controls muted playsinline
               style="width:100%;border-radius:12px;max-height:480px;object-fit:cover;"
               th:attr="poster=${product.imageUrl}">
          Votre navigateur ne supporte pas la lecture vidéo.
        </video>
      </div>
      <div th:if="${product.videoUrl == null or product.videoUrl.isEmpty()}"
           class="product-detail-photo">
        <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
             th:src="${product.imageUrl}" th:alt="${product.name}" 
             style="width:100%; border-radius:12px;"/>
        <div th:if="${product.imageUrl == null or product.imageUrl.isEmpty()}"
             class="d-flex align-items-center justify-content-center"
             style="min-height:380px; background:#f8f6f4; border-radius:12px;">
          <i class="bi bi-image text-secondary display-4"></i>
        </div>
      </div>
    </div>

    <div class="col-lg-6">

      <span th:if="${product.onPromotion}"
            class="badge bg-danger mb-2 px-3 py-2"
            style="font-size:.8rem;letter-spacing:.06em;">PROMO</span>

      <span th:if="${product.promoLabel != null and !product.promoLabel.isEmpty()}"
            class="badge bg-warning text-dark mb-2 ms-1 px-3 py-2"
            style="font-size:.8rem;letter-spacing:.06em;"
            th:text="${product.promoLabel}">Promo</span>

      <span th:if="${product.limitedStock}"
            class="badge bg-warning text-dark mb-2 ms-1 px-3 py-2"
            style="font-size:.8rem;letter-spacing:.06em;">🔥 Stock limité</span>

      <h1 class="h2 mb-3" style="color:var(--bolas-text);" th:text="${product.name}">Nom</h1>

      <p class="mb-3">
        <span th:if="${product.onPromotion}"
              class="product-detail-price-old text-decoration-line-through text-muted me-2"
              th:text="${#numbers.formatInteger(product.priceCfa, 0, 'WHITESPACE')} + ' CFA'">0</span>
        <span class="product-detail-price fw-bold h4" style="color:var(--bolas-accent);"
              th:text="${#numbers.formatInteger(product.effectivePriceCfa, 0, 'WHITESPACE')} + ' CFA'">0 CFA</span>
      </p>

      <p class="small text-muted mb-3">
        <i class="bi bi-tag me-1"></i>
        <span th:text="${product.category.name}">Catégorie</span>
      </p>

      <div class="mb-4" th:if="${product.description != null and !product.description.isEmpty()}">
        <h2 class="h6 text-uppercase mb-2" style="color:var(--bolas-muted);letter-spacing:.08em;">Description</h2>
        <p class="mb-0" style="white-space:pre-wrap;line-height:1.7;" th:text="${product.description}">Desc</p>
      </div>

      <div class="mb-4 p-3 rounded-3" style="background:var(--bolas-light);">
        <div th:if="${product.deliveryAvailable}">
          <i class="bi bi-truck me-2 text-accent"></i>
          <span th:text="'Livraison à domicile disponible — +'
                + ${#numbers.formatInteger(product.deliveryPriceCfa, 0, 'WHITESPACE')} + ' CFA'">Livraison</span>
        </div>
        <div th:if="${!product.deliveryAvailable}" class="text-muted small">
          <i class="bi bi-shop me-2"></i>Retrait en boutique uniquement
        </div>
      </div>

      <fieldset class="mb-4">
        <legend class="form-label fw-semibold mb-2" style="color:var(--bolas-text);">Option de commande</legend>
        <div class="form-check mb-1" th:if="${product.deliveryAvailable}">
          <input class="form-check-input" type="radio" name="deliveryOption"
                 id="optHome" value="HOME" checked/>
          <label class="form-check-label" for="optHome">Livraison à domicile</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="deliveryOption"
                 id="optPickup" value="PICKUP"
                 th:checked="${!product.deliveryAvailable}"/>
          <label class="form-check-label" for="optPickup">Retrait boutique BOLA</label>
        </div>
      </fieldset>

      <div class="d-flex flex-wrap gap-3">
        <form th:action="@{/cart/add}" method="post" id="addToCartForm">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" name="productId" th:value="${product.id}"/>
          <input type="hidden" name="qty" value="1"/>
          <input type="hidden" name="deliveryOption" id="cartDeliveryOption"
                 th:value="${product.deliveryAvailable} ? 'HOME' : 'PICKUP'"/>
          <button type="submit" class="btn btn-hero-solid px-4">
            <i class="bi bi-cart-plus me-2"></i>Ajouter au panier
          </button>
        </form>
        
        <a th:href="|tel:+${shopPhone}|" class="btn btn-call-brown px-4">
          <i class="bi bi-telephone me-2"></i>Appeler
        </a>
      </div>

      <div class="d-flex flex-wrap gap-2 mt-4 pt-3" style="border-top:1px solid var(--bolas-border);">
        <a th:if="${product.vendor != null}" th:href="@{/chat/{id}(id=${product.vendor.id})}"
           class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-chat-dots me-1"></i>Contacter le vendeur
        </a>
        <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal" data-bs-target="#reportModal">
          <i class="bi bi-flag me-1"></i>Signaler
        </button>
      </div>
    </div>
  </div>

  <div class="mt-5 pt-4" style="border-top:1px solid var(--bolas-border);">
     <h2 class="h5 fw-bold mb-4" style="color:var(--bolas-accent);">Avis clients</h2>
     </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
  // Synchronise l'option de livraison choisie avec le formulaire panier
  document.addEventListener('DOMContentLoaded', function() {
    const radioButtons = document.querySelectorAll('input[name="deliveryOption"]');
    const hiddenInput = document.getElementById('cartDeliveryOption');
    
    radioButtons.forEach(radio => {
      radio.addEventListener('change', function() {
        if(hiddenInput) hiddenInput.value = this.value;
      });
    });
  });
</script>
</body>
</html>
