<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle}">Connexion livreur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background:#fff9f5; font-family:'Outfit',sans-serif; }
    .brand { color:#8B5E3C; font-weight:800; font-size:1.8rem; }
    .btn-bolas { background:#8B5E3C; color:#fff; border:none; border-radius:999px; }
    .btn-bolas:hover { background:#6f4a30; color:#fff; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
<div class="card border-0 shadow-sm p-4" style="max-width:400px;width:100%;border-radius:16px;">
  <div class="text-center mb-4">
    <div class="brand">BOLA</div>
    <p class="text-muted small">Espace Livreur</p>
  </div>

  <div th:if="${flashError}" class="alert alert-danger small" th:text="${flashError}"></div>
  <div th:if="${flashOk}"    class="alert alert-success small" th:text="${flashOk}"></div>

  <form th:action="@{/livreur/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="mb-3">
      <label class="form-label fw-semibold small">Téléphone WhatsApp</label>
      <input type="tel" class="form-control" name="phone" required placeholder="ex. 22890123456"/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold small">PIN (4 chiffres)</label>
      <input type="password" class="form-control" name="pin" required minlength="4" maxlength="8"
             placeholder="••••" inputmode="numeric"/>
    </div>
    <button type="submit" class="btn btn-bolas w-100">
      <i class="bi bi-box-arrow-in-right me-1"></i>Se connecter
    </button>
  </form>

  <div class="text-center mt-3">
    <a th:href="@{/livreur/register}" class="small text-muted">Pas encore de compte ? S'inscrire</a>
  </div>
  <div class="text-center mt-2">
    <a th:href="@{/}" class="small text-muted"><i class="bi bi-arrow-left me-1"></i>Retour BOLA</a>
  </div>
</div>
</body>
</html>
