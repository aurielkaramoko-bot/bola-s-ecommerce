<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle}">Inscription livreur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background:#fff9f5; font-family:'Outfit',sans-serif; }
    .brand { color:#8B5E3C; font-weight:800; font-size:1.8rem; }
    .btn-bolas { background:#8B5E3C; color:#fff; border:none; border-radius:999px; }
    .btn-bolas:hover { background:#6f4a30; color:#fff; }
  </style>
</head>
<body>
<div class="container py-5" style="max-width:520px;">
  <div class="text-center mb-4">
    <div class="brand">BOLA</div>
    <p class="text-muted small">Devenir livreur BOLA</p>
  </div>

  <div th:if="${flashError}" class="alert alert-danger" th:text="${flashError}"></div>

  <div class="card border-0 shadow-sm p-4" style="border-radius:16px;">
    <form th:action="@{/livreur/register}" method="post" enctype="multipart/form-data" class="row g-3">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="col-12">
        <label class="form-label fw-semibold small">Nom complet <span class="text-danger">*</span></label>
        <input type="text" class="form-control" name="name" required maxlength="150" placeholder="ex. Kofi Mensah"/>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Téléphone WhatsApp <span class="text-danger">*</span></label>
        <input type="tel" class="form-control" name="phone" required maxlength="40" placeholder="ex. 22890123456"/>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">PIN (4 chiffres min) <span class="text-danger">*</span></label>
        <input type="password" class="form-control" name="pin" required minlength="4" maxlength="8"
               placeholder="••••" inputmode="numeric"/>
        <div class="form-text">Code secret pour vous connecter.</div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Immatriculation</label>
        <input type="text" class="form-control" name="vehiclePlate" maxlength="30" placeholder="ex. TG-1234-AB"/>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Type de véhicule</label>
        <select class="form-select" name="vehicleType">
          <option value="">— Choisir —</option>
          <option value="MOTO">Moto</option>
          <option value="VOITURE">Voiture</option>
          <option value="TRICYCLE">Tricycle</option>
          <option value="VELO">Vélo</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Zone de livraison couverte</label>
        <input type="text" class="form-control" name="deliveryZone" maxlength="300"
               placeholder="ex. Lomé centre, Adidogomé, Bè..."/>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Photo du véhicule (optionnel)</label>
        <input type="file" class="form-control" name="vehiclePhoto" accept="image/*"/>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-bolas w-100">
          <i class="bi bi-person-plus me-1"></i>Créer mon compte livreur
        </button>
      </div>
    </form>
    <div class="text-center mt-3">
      <a th:href="@{/livreur/login}" class="small text-muted">Déjà un compte ? Se connecter</a>
    </div>
  </div>
</div>
</body>
</html>
