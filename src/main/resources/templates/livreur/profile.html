<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${pageTitle}">Mon profil livreur</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link th:href="@{/css/bolas.css}" rel="stylesheet"/>
</head>
<body class="bolas-body">

<nav class="navbar site-header px-3">
  <a class="navbar-brand site-logo" th:href="@{/livreur/dashboard}">BOLA</a>
  <span class="ms-2 badge" style="background:var(--bolas-accent);">Livreur</span>
  <div class="ms-auto d-flex gap-2">
    <a th:href="@{/livreur/dashboard}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Dashboard
    </a>
  </div>
</nav>

<div class="container py-4 flex-grow-1" style="max-width:560px;">
  <h1 class="h4 fw-bold mb-4" style="color:var(--bolas-accent);">
    <i class="bi bi-person-circle me-2"></i>Mon profil
  </h1>

  <div th:if="${flashOk}"    class="alert alert-success" th:text="${flashOk}"></div>
  <div th:if="${flashError}" class="alert alert-danger"  th:text="${flashError}"></div>

  <div class="admin-card p-4">
    <form th:action="@{/livreur/profile}" method="post" enctype="multipart/form-data" class="row g-3">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="col-12">
        <label class="form-label fw-semibold small">Nom complet <span class="text-danger">*</span></label>
        <input type="text" class="form-control" name="name" required maxlength="150"
               th:value="${livreur.name}"/>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Téléphone</label>
        <input type="text" class="form-control" readonly th:value="${livreur.phone}"
               style="background:#f8f6f4;"/>
        <div class="form-text">Le numéro ne peut pas être modifié.</div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Immatriculation</label>
        <input type="text" class="form-control" name="vehiclePlate" maxlength="30"
               th:value="${livreur.vehiclePlate}" placeholder="TG-1234-AB"/>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Type de véhicule</label>
        <select class="form-select" name="vehicleType">
          <option value="">— Choisir —</option>
          <option value="MOTO"     th:selected="${livreur.vehicleType == 'MOTO'}">Moto</option>
          <option value="VOITURE"  th:selected="${livreur.vehicleType == 'VOITURE'}">Voiture</option>
          <option value="TRICYCLE" th:selected="${livreur.vehicleType == 'TRICYCLE'}">Tricycle</option>
          <option value="VELO"     th:selected="${livreur.vehicleType == 'VELO'}">Vélo</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Zone de livraison</label>
        <input type="text" class="form-control" name="deliveryZone" maxlength="300"
               th:value="${livreur.deliveryZone}" placeholder="ex. Lomé centre, Adidogomé..."/>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Photo du véhicule</label>
        <input type="file" class="form-control" name="vehiclePhoto" accept="image/*"/>
        <div th:if="${livreur.vehiclePhotoUrl != null}" class="mt-2">
          <img th:src="${livreur.vehiclePhotoUrl}" style="height:80px;border-radius:8px;object-fit:cover;"/>
        </div>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-hero-solid w-100">
          <i class="bi bi-check-circle me-1"></i>Mettre à jour
        </button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
