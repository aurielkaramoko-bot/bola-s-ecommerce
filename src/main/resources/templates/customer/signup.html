<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Créer un compte — Bola's</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-5 flex-grow-1" style="max-width:520px;">
  <h1 class="h3 fw-bold mb-1 text-center" style="color:var(--bolas-accent);">Créer un compte</h1>
  <p class="text-center text-muted small mb-4">Rejoignez Bola's pour suivre vos commandes facilement</p>

  <div th:if="${flashError}" class="alert alert-danger" th:text="${flashError}"></div>

  <div class="admin-card p-4 mb-3">
    <form th:action="@{/customer/signup}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="row g-2 mb-3">
        <div class="col-md-6">
          <label for="firstName" class="form-label">Prénom <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="firstName" name="firstName" required maxlength="100" autofocus/>
        </div>
        <div class="col-md-6">
          <label for="lastName" class="form-label">Nom <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="lastName" name="lastName" required maxlength="100"/>
        </div>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
        <input type="email" class="form-control" id="email" name="email" required maxlength="200"/>
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Téléphone</label>
        <input type="tel" class="form-control" id="phone" name="phone" maxlength="40"
               placeholder="ex. 22890123456"/>
      </div>
      <div class="mb-3">
        <label for="birthDate" class="form-label">Date de naissance
          <span class="text-muted small">(utilisée pour votre numéro de suivi)</span>
        </label>
        <input type="date" class="form-control" id="birthDate" name="birthDate"/>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe <span class="text-danger">*</span></label>
        <input type="password" class="form-control" id="password" name="password" required minlength="6"/>
        <div class="form-text small">Minimum 6 caractères.</div>
      </div>
      <button type="submit" class="btn btn-hero-solid w-100">Créer mon compte</button>
    </form>

    <hr class="my-3"/>

    <a href="/oauth2/authorization/google"
       class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      S'inscrire avec Google
    </a>
  </div>

  <p class="text-center small">
    Déjà un compte ?
    <a th:href="@{/customer/login}" style="color:var(--bolas-accent);">Se connecter</a>
  </p>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
