<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<body>

<section th:fragment="popular" class="section-popular"
         th:if="${popularProducts != null and !popularProducts.isEmpty()}">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <h2 class="h3 mb-0" style="color:var(--bolas-accent);font-weight:700;">Articles populaires</h2>
      <a href="/products" class="small fw-semibold" style="color:var(--bolas-accent);">
        Voir tout <i class="bi bi-arrow-right"></i>
      </a>
    </div>
    <hr style="width:48px;height:3px;background:var(--bolas-accent);border:none;border-radius:2px;margin:.75rem 0 2rem;"/>
    <div class="products-scroll-wrap">
      <button class="scroll-btn scroll-btn-left" onclick="scrollCards('popular',-1)" aria-label="Précédent">
        <i class="bi bi-chevron-left"></i>
      </button>
      <div class="products-scroll" id="popular">
        <th:block th:each="p : ${popularProducts}">
          <th:block th:replace="~{fragments/product-card :: card(p=${p})}"></th:block>
        </th:block>
      </div>
      <button class="scroll-btn scroll-btn-right" onclick="scrollCards('popular',1)" aria-label="Suivant">
        <i class="bi bi-chevron-right"></i>
      </button>
    </div>
  </div>
</section>

</body>
</html>
