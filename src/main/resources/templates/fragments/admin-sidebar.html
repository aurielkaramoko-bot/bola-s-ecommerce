<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<body>

<aside th:fragment="sidebar (active)" class="col-12 col-md-3 col-lg-2 admin-sidebar p-0">
  <div class="p-3 border-bottom" style="border-color: #eee8e4 !important;">
    <span class="fw-semibold" style="color: #8B5E3C;" th:text="|Admin Bola's|">Admin</span>
  </div>
  <nav class="nav flex-column p-2">
    <a class="nav-link" th:href="@{/admin}" th:classappend="${active == 'dashboard' ? 'active' : ''}">
      <i class="bi bi-speedometer2 me-2"></i><span th:text="'Tableau de bord'">Dashboard</span>
    </a>
    <a class="nav-link" th:href="@{/admin/categories}" th:classappend="${active == 'categories' ? 'active' : ''}">
      <i class="bi bi-tags me-2"></i><span th:text="'Catégories'">Catégories</span>
    </a>
    <a class="nav-link" th:href="@{/admin/products}" th:classappend="${active == 'products' ? 'active' : ''}">
      <i class="bi bi-box-seam me-2"></i><span th:text="'Produits'">Produits</span>
    </a>
    <a class="nav-link" th:href="@{/admin/orders}" th:classappend="${active == 'orders' ? 'active' : ''}">
      <i class="bi bi-receipt me-2"></i><span th:text="'Commandes'">Commandes</span>
    </a>
    <a class="nav-link" th:href="@{/admin/delivery}" th:classappend="${active == 'delivery' ? 'active' : ''}">
      <i class="bi bi-geo-alt me-2"></i><span th:text="'Livraison GPS'">Livraison</span>
    </a>
    <a class="nav-link" th:href="@{/admin/vendors}" th:classappend="${active == 'vendors' ? 'active' : ''}">
      <i class="bi bi-person-badge me-2"></i><span>Vendeurs</span>
    </a>
    <a class="nav-link" th:href="@{/admin/countries}" th:classappend="${active == 'countries' ? 'active' : ''}">
      <i class="bi bi-globe2 me-2"></i><span>Pays</span>
    </a>
    <a class="nav-link" th:href="@{/admin/reports}" th:classappend="${active == 'reports' ? 'active' : ''}">
      <i class="bi bi-flag me-2"></i><span>Signalements</span>
    </a>
    <hr style="border-color: #eee8e4;"/>
    <form th:action="@{/admin/logout}" method="post" class="px-2">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-sm w-100 rounded-pill text-white" style="background:#8B5E3C;" th:text="'Déconnexion'">Déconnexion</button>
    </form>
  </nav>
</aside>

</body>
</html>
