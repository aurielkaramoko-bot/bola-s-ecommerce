<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:fragment="head (title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title} ?: 'BOLA — La Marketplace du Togo'">BOLA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link th:href="@{/css/bolas.css}" rel="stylesheet"/>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5H21YXWJ5G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5H21YXWJ5G');
  </script>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light site-header">
  <div class="container-fluid px-3 px-lg-5">

    <!-- Logo gauche -->
    <a class="navbar-brand site-logo" th:href="@{/}">BOLA</a>

    <!-- Boutons mobile visibles (hors hamburger) -->
    <div class="d-flex d-lg-none align-items-center gap-2 ms-auto me-2">
      <!-- Panier mobile -->
      <a class="btn btn-admin-pill btn-sm px-2" th:href="@{/cart}">
        <i class="bi bi-cart3"></i>
        <span th:if="${cartItemCount != null and cartItemCount > 0}"
              class="badge rounded-pill ms-1"
              style="background:#fff;color:#8B5E3C;font-size:.65rem;"
              th:text="${cartItemCount}">0</span>
      </a>
      <!-- Cloche mobile -->
      <div class="position-relative" th:if="${session.BOLAS_CUSTOMER != null}" id="notif-bell-mobile-wrap">
        <button id="notif-bell-mobile" class="btn btn-admin-pill btn-sm px-2 position-relative"
                onclick="toggleNotifPanel('notif-panel-mobile')" aria-label="Notifications">
          <i class="bi bi-bell"></i>
          <span id="notif-badge-mobile" class="position-absolute badge rounded-pill bg-danger"
                style="top:-4px;right:-4px;font-size:.6rem;display:none;">0</span>
        </button>
        <div id="notif-panel-mobile" class="notif-dropdown-panel shadow" style="display:none;right:0;left:auto;min-width:290px;">
          <div class="p-2 border-bottom d-flex justify-content-between align-items-center">
            <span class="small fw-bold" style="color:#8B5E3C;">Notifications</span>
            <a href="/notifications/read-all" class="small text-muted text-decoration-none">Tout lire</a>
          </div>
          <div id="notif-list-mobile" class="notif-list"></div>
          <a href="/notifications" class="d-block text-center small p-2" style="color:#8B5E3C;">Voir toutes →</a>
        </div>
      </div>
    </div>

    <!-- Toggler mobile -->
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarMain"
            aria-controls="navbarMain" aria-expanded="false" aria-label="Menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <!-- Menu centre — masqué sur mobile (tout dans hamburger) -->
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Accueil</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/products}">Produits</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/categories}">Catégories</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/tracking}">Suivi livraison</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/contact}">Contact</a></li>
        <!-- Liens client dans hamburger mobile -->
        <li class="nav-item d-lg-none" th:if="${session.BOLAS_CUSTOMER != null}">
          <a class="nav-link" th:href="@{/notifications}"><i class="bi bi-bell me-1"></i>Notifications</a>
        </li>
        <li class="nav-item d-lg-none" th:if="${session.BOLAS_CUSTOMER != null}">
          <form th:action="@{/customer/logout}" method="post" class="m-0 d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="nav-link btn btn-link border-0 text-start w-100">
              <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
            </button>
          </form>
        </li>
      </ul>

      <!-- Boutons droite (desktop) -->
      <div class="d-flex justify-content-center justify-content-lg-end align-items-center gap-2 pb-3 pb-lg-0">

        <!-- Bouton "Vendre sur BOLA" -->
        <a class="btn btn-sell-bola" th:href="@{/vendor/login}">
          <i class="bi bi-shop me-1"></i>Vendre sur BOLA
        </a>

        <!-- Panier desktop -->
        <a class="btn btn-admin-pill d-none d-lg-inline-flex align-items-center" th:href="@{/cart}">
          <i class="bi bi-cart3 me-1"></i>
          <span>Panier</span>
          <span th:if="${cartItemCount != null and cartItemCount > 0}"
                class="ms-1 badge rounded-pill"
                style="background:#fff;color:#8B5E3C;border:1px solid rgba(255,255,255,.65);"
                th:text="${cartItemCount}">0</span>
        </a>

        <!-- Cloche notifications desktop (si client connecté) -->
        <div class="position-relative d-none d-lg-block" th:if="${session.BOLAS_CUSTOMER != null}" id="notif-bell-wrap">
          <button id="notif-bell-btn" class="btn btn-admin-pill position-relative"
                  onclick="toggleNotifPanel('notif-panel-desktop')" aria-label="Notifications">
            <i class="bi bi-bell"></i>
            <span id="notif-badge" class="position-absolute badge rounded-pill bg-danger"
                  style="top:-4px;right:-4px;font-size:.65rem;display:none;">0</span>
          </button>
          <div id="notif-panel-desktop" class="notif-dropdown-panel shadow" style="display:none;right:0;min-width:320px;">
            <div class="p-2 border-bottom d-flex justify-content-between align-items-center">
              <span class="small fw-bold" style="color:#8B5E3C;">Notifications</span>
              <form action="/notifications/read-all" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-link btn-sm p-0 small text-muted text-decoration-none">Tout lire</button>
              </form>
            </div>
            <div id="notif-list-desktop" class="notif-list"></div>
            <a href="/notifications" class="d-block text-center small p-2 border-top" style="color:#8B5E3C;">Voir toutes les notifications →</a>
          </div>
        </div>

        <!-- Client connecté via session -->
        <th:block th:if="${session.BOLAS_CUSTOMER != null}">
          <span class="small fw-semibold d-none d-lg-inline" style="color:var(--bolas-accent);"
                th:text="'Bonjour, ' + ${session.BOLAS_CUSTOMER.firstName}">Bonjour</span>
          <form th:action="@{/customer/logout}" method="post" class="m-0 d-none d-lg-block">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-admin-pill">
              <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
            </button>
          </form>
        </th:block>

        <!-- Pas de client connecté -->
        <th:block th:if="${session.BOLAS_CUSTOMER == null}">
          <a class="btn btn-admin-pill" th:href="@{/customer/login}">
            <i class="bi bi-person me-1"></i>Connexion
          </a>
        </th:block>

        <!-- Admin dashboard si admin connecté -->
        <a class="btn btn-admin-pill" th:href="@{/admin}"
           sec:authorize="hasRole('ADMIN')">
          <i class="bi bi-speedometer2 me-1"></i> Tableau de bord
        </a>
      </div>
    </div>
  </div>
</nav>

<!-- ===== STYLES CLOCHE ===== -->
<style th:fragment="notif-styles">
.notif-dropdown-panel {
  position: absolute; z-index: 1050; background: #fff;
  border: 1px solid var(--bolas-border, #e8d5c0);
  border-radius: 12px; overflow: hidden; top: calc(100% + 8px);
}
.notif-list { max-height: 300px; overflow-y: auto; }
.notif-item { padding: .6rem 1rem; border-bottom: 1px solid #f5f0eb; cursor: pointer; }
.notif-item:hover { background: #fdf6ee; }
.notif-item.unread { border-left: 3px solid #C49A6C; }
.notif-item .notif-titre { font-size:.85rem; font-weight:600; color:#3d2b1f; }
.notif-item .notif-msg   { font-size:.78rem; color:#888; margin-top:2px; }
.notif-item .notif-time  { font-size:.72rem; color:#bbb; float:right; }
</style>

<!-- ===== SCRIPT CLOCHE (polling 30s) ===== -->
<script th:fragment="notif-script" th:if="${session.BOLAS_CUSTOMER != null}">
(function() {
  const CSRF = document.querySelector('meta[name="_csrf"]')?.content || '';

  function updateBadge(count) {
    ['notif-badge','notif-badge-mobile'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = count;
      el.style.display = count > 0 ? 'inline-block' : 'none';
    });
  }

  function renderNotifs(list, containerId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    if (!list || list.length === 0) {
      el.innerHTML = '<div class="notif-item text-muted small text-center">Aucune notification</div>';
      return;
    }
    el.innerHTML = list.map(n => `
      <div class="notif-item ${!n.lue ? 'unread' : ''}"
           onclick="markRead(${n.id}, '${n.lienAction || ''}')">
        <span class="notif-time">${formatAge(n.createdAt)}</span>
        <div class="notif-titre">${n.titre}</div>
        <div class="notif-msg">${n.message}</div>
      </div>`).join('');
  }

  function fetchCount() {
    fetch('/api/notifications/count')
      .then(r => r.json())
      .then(d => updateBadge(d.count || 0))
      .catch(() => {});
  }

  function fetchRecent() {
    fetch('/api/notifications/recent')
      .then(r => r.json())
      .then(list => {
        renderNotifs(list, 'notif-list-desktop');
        renderNotifs(list, 'notif-list-mobile');
      })
      .catch(() => {});
  }

  window.markRead = function(id, url) {
    fetch('/api/notifications/' + id + '/read', {method:'POST',
      headers:{'X-CSRF-TOKEN': getCsrf()}})
      .finally(() => { if (url) window.location.href = url; else fetchCount(); });
  };

  window.toggleNotifPanel = function(panelId) {
    const p = document.getElementById(panelId);
    if (!p) return;
    const visible = p.style.display !== 'none';
    document.querySelectorAll('.notif-dropdown-panel').forEach(el => el.style.display='none');
    if (!visible) { p.style.display = 'block'; fetchRecent(); }
  };

  function getCsrf() {
    return document.querySelector('input[name="_csrf"]')?.value
        || document.querySelector('meta[name="_csrf"]')?.content || '';
  }

  function formatAge(dt) {
    if (!dt) return '';
    const d = new Date(dt); const now = new Date();
    const diff = Math.floor((now - d) / 60000);
    if (diff < 1) return 'à l\'instant';
    if (diff < 60) return diff + ' min';
    if (diff < 1440) return Math.floor(diff/60) + 'h';
    return Math.floor(diff/1440) + 'j';
  }

  // Fermer le panneau en cliquant ailleurs
  document.addEventListener('click', e => {
    if (!e.target.closest('#notif-bell-wrap') && !e.target.closest('#notif-bell-mobile-wrap')) {
      document.querySelectorAll('.notif-dropdown-panel').forEach(el => el.style.display='none');
    }
  });

  // Premier chargement + polling 30s
  fetchCount();
  setInterval(fetchCount, 30000);
})();
</script>

</body>
</html>
