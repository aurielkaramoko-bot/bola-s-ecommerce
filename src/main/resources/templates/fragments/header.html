<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:fragment="head (title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title} ?: 'BOLA — La Marketplace du Togo'">BOLA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&amp;display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link th:href="@{/css/bolas.css}" rel="stylesheet"/>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5H21YXWJ5G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5H21YXWJ5G');
  </script>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light site-header">
  <div class="container-fluid px-3 px-lg-5">

    <!-- Logo gauche -->
    <a class="navbar-brand site-logo" th:href="@{/}">BOLA</a>

    <!-- Toggler mobile -->
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarMain"
            aria-controls="navbarMain" aria-expanded="false" aria-label="Menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <!-- Menu centre -->
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/}">Accueil</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/products}">Produits</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/categories}">Catégories</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/tracking}">Suivi livraison</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/contact}">Contact</a>
        </li>
      </ul>

      <!-- Boutons droite -->
      <div class="d-flex justify-content-center justify-content-lg-end align-items-center gap-2 pb-3 pb-lg-0">

        <!-- Bouton "Vendre sur BOLA" toujours visible -->
        <a class="btn btn-sell-bola" th:href="@{/vendor/login}">
          <i class="bi bi-shop me-1"></i>Vendre sur BOLA
        </a>

        <a class="btn btn-admin-pill" th:href="@{/cart}">
          <i class="bi bi-cart3 me-1"></i>
          <span>Panier</span>
          <span th:if="${cartItemCount != null and cartItemCount > 0}"
                class="ms-1 badge rounded-pill"
                style="background:#fff;color:#8B5E3C;border:1px solid rgba(255,255,255,.65);"
                th:text="${cartItemCount}">0</span>
        </a>

        <!-- Client connecté via session -->
        <th:block th:if="${session.BOLAS_CUSTOMER != null}">
          <span class="small fw-semibold" style="color:var(--bolas-accent);"
                th:text="'Bonjour, ' + ${session.BOLAS_CUSTOMER.firstName}">Bonjour</span>
          <form th:action="@{/customer/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-admin-pill">
              <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
            </button>
          </form>
        </th:block>

        <!-- Pas de client connecté -->
        <th:block th:if="${session.BOLAS_CUSTOMER == null}">
          <a class="btn btn-admin-pill" th:href="@{/customer/login}">
            <i class="bi bi-person me-1"></i>Connexion
          </a>
        </th:block>

        <!-- Admin dashboard si admin connecté -->
        <a class="btn btn-admin-pill" th:href="@{/admin}"
           sec:authorize="hasRole('ADMIN')">
          <i class="bi bi-speedometer2 me-1"></i> Tableau de bord
        </a>
      </div>
    </div>
  </div>
</nav>

</body>
</html>
