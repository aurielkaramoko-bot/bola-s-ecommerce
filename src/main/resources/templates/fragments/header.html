<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="fr">
<head th:fragment="head (title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title} ?: 'Bola\'s'">Bola's</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&amp;display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link th:href="@{/css/bolas.css}" rel="stylesheet"/>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light site-header">
  <div class="container-fluid px-3 px-lg-5">

    <!-- Logo gauche -->
    <a class="navbar-brand site-logo" th:href="@{/}">Bola's</a>

    <!-- Toggler mobile -->
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarMain"
            aria-controls="navbarMain" aria-expanded="false" aria-label="Menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <!-- Menu centre -->
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/}">Accueil</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/products}">Produits</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/categories}">Catégories</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/tracking}">Suivi livraison</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/contact}">Contact</a>
        </li>
      </ul>

      <!-- Bouton connexion droite -->
      <div class="d-flex justify-content-center justify-content-lg-end pb-3 pb-lg-0">
        <a class="btn btn-admin-pill me-2" th:href="@{/cart}">
          <i class="bi bi-cart3 me-1"></i>
          <span th:text="'Panier'">Panier</span>
          <span th:if="${cartItemCount != null and cartItemCount > 0}"
                class="ms-1 badge rounded-pill"
                style="background:#fff;color:#8B5E3C;border:1px solid rgba(255,255,255,.65);"
                th:text="${cartItemCount}">0</span>
        </a>
        <a class="btn btn-admin-pill" th:href="@{/admin/login}"
           sec:authorize="!isAuthenticated()">
          <i class="bi bi-person-lock me-1"></i> Connexion
        </a>
        <a class="btn btn-admin-pill" th:href="@{/admin}"
           sec:authorize="isAuthenticated()">
          <i class="bi bi-speedometer2 me-1"></i> Tableau de bord
        </a>
      </div>
    </div>
  </div>
</nav>

</body>
</html>
