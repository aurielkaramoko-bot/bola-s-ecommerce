<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<body>

<th:block th:fragment="card (p)">
  <article class="product-card-artisal d-flex flex-column">

    <div class="product-img-wrap flex-shrink-0">
      <span th:if="${p.onPromotion}" class="badge-promo">PROMO</span>
      <span th:if="${p.promoLabel != null and !p.promoLabel.isEmpty()}"
            style="position:absolute;top:8px;right:8px;background:#e67e22;color:#fff;font-size:.65rem;padding:2px 7px;border-radius:999px;z-index:2;font-weight:600;"
            th:text="${p.promoLabel}">Promo</span>
      <span th:if="${p.sponsored}" class="badge-sponsored"
            style="position:absolute;top:8px;left:8px;background:#8B5E3C;color:#fff;font-size:.65rem;padding:2px 7px;border-radius:999px;z-index:2;font-weight:600;">
        ⭐ Sponsorisé
      </span>
      <span th:if="${p.limitedStock}" class="badge-stock-limited">🔥 Stock limité</span>
      <span class="badge-price">
        <span th:if="${p.onPromotion}" class="price-old"
              th:text="${#numbers.formatInteger(p.priceCfa,0,'COMMA')} + ' CFA'">0</span>
        <span th:text="${#numbers.formatInteger(p.effectivePriceCfa,0,'COMMA')} + ' CFA'">0 CFA</span>
      </span>

      <video th:if="${p.videoUrl != null and !p.videoUrl.isEmpty()}"
             th:src="${p.videoUrl}"
             autoplay muted loop playsinline
             style="width:100%;height:100%;object-fit:cover;display:block;"
             th:attr="poster=${p.imageUrl}">
      </video>

      <img th:if="${(p.videoUrl == null or p.videoUrl.isEmpty()) and (p.imageUrl != null and !p.imageUrl.isEmpty())}"
           th:src="${p.imageUrl}" th:alt="${p.name}" loading="lazy"/>

      <div th:if="${(p.videoUrl == null or p.videoUrl.isEmpty()) and (p.imageUrl == null or p.imageUrl.isEmpty())}"
           class="d-flex align-items-center justify-content-center h-100 text-secondary">
        <i class="bi bi-image fs-1"></i>
      </div>
    </div>

    <div class="card-body-artisal flex-grow-1 d-flex flex-column">
      <h3 th:text="${p.name}">Nom</h3>

      <div class="d-flex align-items-center gap-2 mt-auto">
        <a th:href="@{/products/{id}(id=${p.id})}" class="btn-detail flex-grow-1">
          Voir détails
        </a>
        
        <form th:action="@{/cart/add}" method="post" class="m-0 flex-shrink-0 add-to-cart-form">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" name="productId" th:value="${p.id}"/>
          <input type="hidden" name="qty" value="1"/>
          
          <button type="submit" class="btn-card-cart" 
                  th:title="'Ajouter ' + ${p.name} + ' au panier'"
                  aria-label="Ajouter au panier">
            <i class="bi bi-cart-plus"></i>
          </button>
        </form>
      </div>
    </div>
  </article>
</th:block>

</body>
</html>
