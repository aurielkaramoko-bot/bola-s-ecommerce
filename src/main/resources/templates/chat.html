<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Chat — BOLA</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-4 flex-grow-1" style="max-width:720px;">

  <!-- Header -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i>
    </a>
    <div style="width:44px;height:44px;background:linear-gradient(135deg,#8B5E3C,#C49A6C);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <i class="bi bi-shop" style="font-size:1.2rem;color:#fff;"></i>
    </div>
    <div>
      <h1 class="h5 fw-bold mb-0" style="color:var(--bolas-accent);"
          th:text="${vendor.displayName}">Vendeur</h1>
      <p class="text-muted small mb-0">Chat direct avec le vendeur</p>
    </div>
  </div>

  <!-- Zone de messages -->
  <div class="admin-card p-3 mb-3" id="chat-messages"
       style="max-height:500px;overflow-y:auto;min-height:200px;">

    <div th:if="${messages.isEmpty()}" class="text-center text-muted py-5">
      <i class="bi bi-chat-dots" style="font-size:2.5rem;opacity:.3;display:block;"></i>
      <p class="mt-2 mb-0">Aucun message. Envoyez le premier !</p>
    </div>

    <div th:each="m : ${messages}" class="mb-3">
      <!-- Message client (à droite) -->
      <div th:if="${m.senderType == 'CUSTOMER'}" class="d-flex justify-content-end">
        <div style="max-width:75%;background:var(--bolas-accent);color:#fff;border-radius:16px 16px 4px 16px;padding:.6rem 1rem;">
          <p class="mb-0 small" th:text="${m.message}">msg</p>
          <span class="d-block text-end mt-1" style="font-size:.65rem;opacity:.7;"
                th:text="${#temporals.format(m.sentAt,'HH:mm')}">12:00</span>
        </div>
      </div>
      <!-- Message vendeur (à gauche) -->
      <div th:if="${m.senderType == 'VENDOR'}" class="d-flex justify-content-start">
        <div style="max-width:75%;background:var(--bolas-light);color:var(--bolas-text);border-radius:16px 16px 16px 4px;padding:.6rem 1rem;">
          <p class="mb-0 small" th:text="${m.message}">msg</p>
          <span class="d-block text-end mt-1" style="font-size:.65rem;color:var(--bolas-muted);"
                th:text="${#temporals.format(m.sentAt,'HH:mm')}">12:00</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Formulaire d'envoi -->
  <form th:action="@{/chat/{id}/send(id=${vendor.id})}" method="post"
        class="d-flex gap-2">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="text" class="form-control" name="message" required
           placeholder="Écrire un message..." maxlength="2000" autofocus/>
    <button type="submit" class="btn btn-hero-solid px-4 flex-shrink-0">
      <i class="bi bi-send"></i>
    </button>
  </form>

  <p class="small text-muted text-center mt-2">
    <i class="bi bi-arrow-clockwise me-1"></i>Actualisation automatique toutes les 10 secondes.
  </p>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
<script>
  // Auto-scroll au bas des messages
  var chatBox = document.getElementById('chat-messages');
  if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;

  // Auto-refresh toutes les 10 secondes si pas en train de taper
  var inputField = document.querySelector('input[name="message"]');
  var refreshTimer = setInterval(function() {
    if (!inputField || inputField.value.trim() === '') {
      location.reload();
    }
  }, 10000);

  // Annuler le refresh si l'utilisateur tape
  if (inputField) {
    inputField.addEventListener('input', function() {
      clearInterval(refreshTimer);
    });
  }
</script>
</body>
</html>
