<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Boutique — BOLA</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-5 flex-grow-1">

  <!-- Header boutique -->
  <div class="d-flex align-items-center gap-4 mb-5 flex-wrap">
    <img th:if="${vendor.logoUrl != null}" th:src="${vendor.logoUrl}"
         th:alt="${vendor.displayName}"
         style="width:96px;height:96px;object-fit:cover;border-radius:50%;border:3px solid var(--bolas-accent);flex-shrink:0;"/>
    <div th:if="${vendor.logoUrl == null}"
         style="width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#8B5E3C,#C49A6C);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <i class="bi bi-shop-window" style="font-size:2.5rem;color:#fff;"></i>
    </div>
    <div>
      <h1 class="h3 fw-bold mb-1" style="color:var(--bolas-accent);"
          th:text="${vendor.displayName}">Boutique</h1>
      <p class="text-muted mb-1" th:if="${vendor.shopDescription != null}"
         th:text="${vendor.shopDescription}">Description</p>
      <span th:if="${vendor.plan.name() == 'PREMIUM'}"
            class="badge me-1" style="background:linear-gradient(135deg,#8B5E3C,#C49A6C);">
        ⭐ Vendeur Premium vérifié
      </span>
      <span th:if="${vendor.plan.name() == 'PRO_LOCAL' or vendor.plan.name() == 'PRO'}"
            class="badge bg-warning text-dark me-1">⭐ Pro</span>
      <!-- Note moyenne -->
      <div th:if="${reviewCount != null and reviewCount > 0}" class="mt-1">
        <th:block th:each="i : ${#numbers.sequence(1, 5)}">
          <i class="bi" th:classappend="${i <= avgRating} ? 'bi-star-fill text-warning' : 'bi-star text-muted'" style="font-size:0.9rem;"></i>
        </th:block>
        <span class="small text-muted ms-1">(<span th:text="${reviewCount}">0</span> avis)</span>
      </div>
      <div class="mt-2 d-flex gap-2 flex-wrap">
        <!-- Adresse si renseignée -->
        <span th:if="${vendor.shopAddress != null}" class="badge bg-light text-dark">
          <i class="bi bi-geo-alt-fill text-danger me-1"></i>
          <span th:text="${vendor.shopAddress}">Adresse</span>
        </span>
        <!-- Bouton chat si PRO/PREMIUM -->
        <a th:if="${vendor.canChat()}" th:href="@{/chat/{id}(id=${vendor.id})}"
           class="btn btn-sm btn-hero-solid">
          <i class="bi bi-chat-dots me-1"></i>Contacter le vendeur
        </a>
        <button type="button" class="btn btn-outline-danger btn-sm"
                data-bs-toggle="modal" data-bs-target="#reportVendorModal">
          <i class="bi bi-flag me-1"></i>Signaler cette boutique
        </button>
      </div>
    </div>
  </div>

  <!-- Produits de la boutique -->
  <h2 class="h5 fw-bold mb-3" style="color:var(--bolas-accent);">
    <i class="bi bi-box-seam me-2"></i>Produits
    <span class="badge bg-secondary ms-2" th:text="${products.size()}">0</span>
  </h2>

  <div class="row g-3" th:if="${!products.isEmpty()}">
    <div class="col-6 col-md-4 col-lg-3" th:each="p : ${products}">
      <th:block th:replace="~{fragments/product-card :: card(p=${p})}"></th:block>
    </div>
  </div>
  <div th:if="${products.isEmpty()}" class="text-muted small py-4 text-center">
    <i class="bi bi-box fs-2 d-block mb-2 opacity-25"></i>
    Cette boutique n'a pas encore de produits.
  </div>

  <!-- Section avis clients -->
  <div th:if="${vendorReviews != null and !vendorReviews.isEmpty()}" class="mt-5">
    <h2 class="h5 fw-bold mb-3" style="color:var(--bolas-accent);">
      <i class="bi bi-chat-quote me-2"></i>Avis clients
    </h2>
    <div th:each="review : ${vendorReviews}" class="admin-card p-3 mb-2">
      <div class="d-flex align-items-start gap-3">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#eee,#ddd);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i class="bi bi-person" style="font-size:1rem;color:#999;"></i>
        </div>
        <div class="flex-grow-1">
          <div class="d-flex align-items-center gap-2 mb-1">
            <strong class="small" th:text="${review.reviewerName}">Client</strong>
            <div>
              <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                <i class="bi" th:classappend="${i <= review.rating} ? 'bi-star-fill text-warning' : 'bi-star text-muted'" style="font-size:0.75rem;"></i>
              </th:block>
            </div>
            <span class="small text-muted ms-auto" th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy')}"></span>
          </div>
          <div class="small text-muted mb-1" th:if="${review.product != null}">
            <i class="bi bi-box-seam me-1"></i><span th:text="${review.product.name}">Produit</span>
          </div>
          <p th:if="${review.comment != null}" class="small mb-1" th:text="${review.comment}"></p>
          <!-- Réponse vendeur -->
          <div th:if="${review.vendorReply != null}" class="p-2 rounded small mt-1" style="background:rgba(139,94,60,0.05);border-left:3px solid var(--bolas-accent);">
            <span class="fw-semibold" style="color:var(--bolas-accent);">
              <i class="bi bi-reply me-1"></i>Réponse du vendeur :
            </span>
            <span th:text="${review.vendorReply}"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Localisation de la boutique -->
  <div th:if="${vendor.hasLocation()}" class="mt-5">
    <h2 class="h5 fw-bold mb-3" style="color:var(--bolas-accent);">
      <i class="bi bi-geo-alt-fill me-2"></i>Localisation de la boutique
    </h2>
    <div th:if="${vendor.shopAddress != null}" class="mb-2 small text-muted">
      <i class="bi bi-pin-map me-1"></i><span th:text="${vendor.shopAddress}">Adresse</span>
    </div>
    <div id="shopMap" style="width:100%;height:350px;border-radius:12px;border:2px solid var(--bolas-accent);box-shadow:0 4px 20px rgba(139,94,60,0.15);"></div>
  </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>

<!-- Modal signalement vendeur -->
<div class="modal fade" id="reportVendorModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="border-color:var(--bolas-border);">
        <h5 class="modal-title" style="color:var(--bolas-accent);">
          <i class="bi bi-flag me-2"></i>Signaler cette boutique
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/report}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="targetType" value="VENDOR"/>
        <input type="hidden" name="targetId" th:value="${vendor.id}"/>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Votre email</label>
            <input type="email" class="form-control" name="reporterEmail"
                   placeholder="Pour que nous puissions vous recontacter" maxlength="200"/>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Raison <span class="text-danger">*</span></label>
            <select class="form-select" name="reason" required>
              <option value="">Choisir une raison</option>
              <option value="Vendeur frauduleux">Vendeur frauduleux</option>
              <option value="Produits contrefaits">Produits contrefaits</option>
              <option value="Comportement inapproprié">Comportement inapproprié</option>
              <option value="Arnaque suspectée">Arnaque suspectée</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
        </div>
        <div class="modal-footer" style="border-color:var(--bolas-border);">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annuler</button>
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-flag me-1"></i>Signaler
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Google Maps pour localisation boutique -->
<script th:if="${vendor.hasLocation() and googleMapsApiKey != null and !googleMapsApiKey.isEmpty()}"
        th:src="${'https://maps.googleapis.com/maps/api/js?key=' + googleMapsApiKey + '&callback=initShopMap'}"
        async defer></script>
<script th:if="${vendor.hasLocation()}">
function initShopMap() {
  var lat = [[${vendor.shopLatitude}]];
  var lng = [[${vendor.shopLongitude}]];
  var shopName = '[[${vendor.displayName}]]';
  var mapEl = document.getElementById('shopMap');
  if (!mapEl) return;
  var pos = { lat: lat, lng: lng };
  var map = new google.maps.Map(mapEl, {
    center: pos,
    zoom: 15,
    styles: [
      { featureType: 'poi', stylers: [{ visibility: 'simplified' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] }
    ]
  });
  new google.maps.Marker({
    position: pos,
    map: map,
    title: shopName,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 12,
      fillColor: '#8B5E3C',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 3
    }
  });
}
// Fallback si l'API est déjà chargée
if (typeof google !== 'undefined' && google.maps) initShopMap();
</script>
</body>
</html>
