<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Produit — BOLA</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container py-4 flex-grow-1" style="max-width:720px;">

  <!-- Header -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/vendor/products}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h1 class="h4 fw-bold mb-0" style="color:var(--bolas-accent);"
        th:text="${isEdit} ? 'Modifier le produit' : 'Ajouter un produit'">Produit</h1>
  </div>

  <div th:if="${flashError}" class="alert alert-danger" th:text="${flashError}"></div>
  <div th:if="${flashOk}" class="alert alert-success" th:text="${flashOk}"></div>

  <div class="admin-card p-4">
    <form th:action="${isEdit} ? @{/vendor/products/{id}/edit(id=${product.id})} : @{/vendor/products/add}"
          method="post" enctype="multipart/form-data" id="vendor-product-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="row g-3">

        <!-- Nom -->
        <div class="col-12">
          <label for="prod-name" class="form-label fw-semibold small">
            Nom du produit <span class="text-danger">*</span>
          </label>
          <input type="text" class="form-control" id="prod-name" name="name"
                 th:value="${product.name}"
                 required maxlength="200"
                 placeholder="ex. Robe wax taille 38"/>
        </div>

        <!-- Prix + Promo -->
        <div class="col-md-6">
          <label for="prod-price" class="form-label fw-semibold small">
            Prix (FCFA) <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <input type="number" class="form-control" id="prod-price" name="priceCfa"
                   th:value="${product.priceCfa}"
                   required min="1" placeholder="ex. 15000"/>
            <span class="input-group-text">FCFA</span>
          </div>
        </div>

        <div class="col-md-6">
          <label for="prod-promo" class="form-label fw-semibold small">
            Prix promo (optionnel)
          </label>
          <div class="input-group">
            <input type="number" class="form-control" id="prod-promo" name="promoPriceCfa"
                   th:value="${product.promoPriceCfa}"
                   min="1" placeholder="Laisser vide si sans promo"/>
            <span class="input-group-text">FCFA</span>
          </div>
        </div>

        <!-- Catégorie -->
        <div class="col-12">
          <label for="prod-cat" class="form-label fw-semibold small">
            Catégorie <span class="text-danger">*</span>
          </label>
          <select class="form-select" id="prod-cat" name="categoryId"
                  th:required="${categories != null and !categories.isEmpty()}">
            <option value="">— Choisir une catégorie —</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                    th:selected="${product.category != null and product.category.id == c.id}">
            </option>
          </select>
          <div th:if="${categories == null or categories.isEmpty()}" class="form-text text-warning">
            <i class="bi bi-exclamation-triangle me-1"></i>Aucune catégorie assignée. Envoyez une demande ci-dessous.
          </div>
        </div>

        <!-- Demande de nouvelle catégorie — form séparé hors du form principal -->
        <div class="col-12">
          <div class="p-2 rounded-3" style="background:var(--bolas-light);border:1px dashed var(--bolas-accent);">
            <p class="small fw-semibold mb-1" style="color:var(--bolas-accent);">
              <i class="bi bi-plus-circle me-1"></i>Catégorie manquante ?
            </p>
            <div class="d-flex gap-2">
              <input type="text" class="form-control form-control-sm" id="cat-request-input"
                     placeholder="ex. Cosmétiques bio" maxlength="150"/>
              <button type="button" class="btn btn-sm btn-outline-secondary text-nowrap"
                      onclick="sendCategoryRequest()">
                <i class="bi bi-send me-1"></i>Demander
              </button>
            </div>
            <div id="cat-request-ok" class="small text-success mt-1" style="display:none;">
              <i class="bi bi-check-circle me-1"></i>Demande envoyée !
            </div>
          </div>
        </div>

        <!-- Livraison -->
        <div class="col-md-6">
          <label for="prod-delivery-price" class="form-label fw-semibold small">
            Frais de livraison (FCFA)
          </label>
          <div class="input-group">
            <input type="number" class="form-control" id="prod-delivery-price"
                   name="deliveryPriceCfa"
                   th:value="${product.deliveryPriceCfa ?: 0}"
                   min="0" placeholder="0 = gratuit"/>
            <span class="input-group-text">FCFA</span>
          </div>
        </div>

        <!-- Image URL — masquée sur mobile -->
        <div class="col-12 d-none d-md-block">
          <label for="prod-image-url" class="form-label fw-semibold small">URL de l'image</label>
          <input type="url" class="form-control" id="prod-image-url" name="imageUrl"
                 th:value="${product.imageUrl}"
                 placeholder="https://... (ou uploadez ci-dessous)"/>
        </div>

        <!-- Image file upload -->
        <div class="col-12">
          <label for="prod-image-file" class="form-label fw-semibold small">
            <i class="bi bi-image me-1"></i>Image du produit
          </label>
          <input type="file" class="form-control" id="prod-image-file" name="imageFile"
                 accept="image/*"/>
          <div class="form-text">JPEG/PNG/WebP, max 5 Mo.</div>
          <div th:if="${product.imageUrl != null}" class="mt-2">
            <img th:src="${product.imageUrl}" alt="Image actuelle"
                 style="height:80px;border-radius:8px;object-fit:cover;"/>
            <span class="small text-muted ms-2">Image actuelle</span>
          </div>
        </div>

        <!-- Vidéo du produit -->
        <div class="col-12">
          <label for="prod-video-file" class="form-label fw-semibold small">
            <i class="bi bi-camera-video me-1"></i>Vidéo du produit (optionnel)
          </label>
          <input type="file" class="form-control" id="prod-video-file" name="videoFile"
                 accept="video/mp4,video/webm,video/quicktime"/>
          <div class="form-text">MP4/WebM, max 50 Mo.</div>
          <div th:if="${product.videoUrl != null}" class="mt-2 d-flex align-items-center gap-2">
            <i class="bi bi-camera-video-fill text-success"></i>
            <span class="small text-muted">Vidéo actuelle enregistrée</span>
            <input type="hidden" name="removeVideo" id="removeVideo" value="false"/>
            <button type="button" class="btn btn-sm btn-outline-danger"
                    onclick="document.getElementById('removeVideo').value='true';this.closest('.mt-2').querySelector('span').textContent='Vidéo supprimée au prochain enregistrement';">
              <i class="bi bi-trash me-1"></i>Supprimer la vidéo
            </button>
          </div>
        </div>

        <!-- Description -->
        <div class="col-12">
          <label for="prod-desc" class="form-label fw-semibold small">Description</label>
          <textarea class="form-control" id="prod-desc" name="description"
                    maxlength="8000" rows="4"
                    placeholder="Décrivez votre produit : matière, taille, couleurs disponibles..."
                    th:text="${product.description}"></textarea>
        </div>

        <!-- Options -->
        <div class="col-md-6">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="prod-available"
                   name="available" value="true"
                   th:checked="${product.available == null or product.available}"/>
            <label class="form-check-label small fw-semibold" for="prod-available">
              Produit disponible à la vente
            </label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="prod-delivery"
                   name="deliveryAvailable" value="true"
                   th:checked="${product.deliveryAvailable == null or product.deliveryAvailable}"/>
            <label class="form-check-label small fw-semibold" for="prod-delivery">
              Livraison disponible
            </label>
          </div>
        </div>

        <!-- Stock limité — tous plans -->
        <div class="col-12">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="prod-limited"
                   name="limitedStock" value="true"
                   th:checked="${product.limitedStock}"/>
            <label class="form-check-label small fw-semibold" for="prod-limited">
              <span class="badge bg-danger me-1" style="font-size:.7rem;">🔥 Stock limité</span>
              Afficher le badge "Stock limité" sur ce produit
            </label>
          </div>
        </div>

        <!-- Badge promo personnalisé — PRO / PREMIUM uniquement -->
        <div class="col-12"
             th:if="${vendor.plan.name() == 'PRO' or vendor.plan.name() == 'PRO_LOCAL' or vendor.plan.name() == 'PREMIUM'}">
          <label for="prod-promo-label" class="form-label fw-semibold small">
            <span class="badge bg-warning text-dark me-1" style="font-size:.7rem;">🎉 Promo</span>
            Badge promotion personnalisé
            <span class="text-muted fw-normal">(optionnel — ex: "Soldes", "Fête des mères -20%")</span>
          </label>
          <input type="text" class="form-control" id="prod-promo-label" name="promoLabel"
                 th:value="${product.promoLabel}"
                 maxlength="60"
                 placeholder="ex. Soldes d'été, Fête des mères -20%, Noël spécial..."/>
          <div class="form-text">Affiché comme badge coloré sur la fiche produit. Laissez vide pour désactiver.</div>
        </div>

        <!-- Actions -->
        <div class="col-12 d-flex gap-2 pt-2">
          <button type="submit" id="btn-save-product" class="btn btn-hero-solid">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${isEdit} ? 'Enregistrer les modifications' : 'Ajouter le produit'">Sauvegarder</span>
          </button>
          <a th:href="@{/vendor/products}" class="btn btn-outline-secondary">Annuler</a>
        </div>

      </div>
    </form>
  </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
<script th:inline="javascript">
var csrfToken = /*[[${_csrf.token}]]*/ '';
var csrfHeader = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';

function sendCategoryRequest() {
  var input = document.getElementById('cat-request-input');
  var name = input.value.trim();
  if (!name) { input.focus(); return; }
  fetch('/vendor/products/request-category', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded', [csrfHeader]: csrfToken },
    body: 'categoryName=' + encodeURIComponent(name)
  }).then(function() {
    document.getElementById('cat-request-ok').style.display = 'block';
    input.value = '';
  }).catch(function() {
    alert('Erreur lors de l\'envoi. Réessayez.');
  });
}
</script>
</body>
</html>
