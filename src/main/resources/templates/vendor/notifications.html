<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Mes notifications — BOLA</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container py-4 flex-grow-1" style="max-width:720px;">

  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/vendor/dashboard}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h1 class="h4 fw-bold mb-0" style="color:var(--bolas-accent);">
      <i class="bi bi-bell me-2"></i>Mes notifications
    </h1>
    <!-- Marquer tout lu -->
    <form th:action="@{/vendor/notifications/read-all}" method="post" class="ms-auto">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-check2-all me-1"></i>Tout marquer lu
      </button>
    </form>
  </div>

  <div th:if="${flashOk}" class="alert alert-success" th:text="${flashOk}"></div>

  <div class="admin-card">
    <div th:if="${notifications == null or notifications.isEmpty()}" class="p-5 text-center text-muted">
      <i class="bi bi-bell-slash" style="font-size:2.5rem;opacity:.3;display:block;margin-bottom:8px;"></i>
      Aucune notification pour l'instant.
    </div>

    <div th:each="n : ${notifications}"
         class="d-flex align-items-start gap-3 p-3 border-bottom notif-item-row"
         th:classappend="${!n.lue} ? 'unread-row' : ''"
         style="border-left: 3px solid transparent;"
         th:style="${!n.lue} ? 'border-left: 3px solid var(--bolas-accent);' : ''">

      <!-- Icône par type -->
      <div style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;"
           th:style="${n.type.name() == 'COMMANDE'} ? 'background:#e8f5e9;color:#27ae60;'
                    : (${n.type.name() == 'LIVRAISON'} ? 'background:#e3f2fd;color:#1565c0;'
                    : (${n.type.name() == 'CHAT'} ? 'background:#fce4ec;color:#c62828;'
                    : (${n.type.name() == 'ABONNEMENT'} ? 'background:#fff3e0;color:#e65100;'
                    : 'background:#f5f5f5;color:#666;')))">
        <i class="bi"
           th:classappend="${n.type.name() == 'COMMANDE'} ? 'bi-bag-check'
                          : (${n.type.name() == 'LIVRAISON'} ? 'bi-bicycle'
                          : (${n.type.name() == 'CHAT'} ? 'bi-chat-dots'
                          : (${n.type.name() == 'ABONNEMENT'} ? 'bi-credit-card'
                          : 'bi-info-circle')))"></i>
      </div>

      <div class="flex-grow-1">
        <div class="fw-semibold small" th:text="${n.titre}" th:classappend="${!n.lue} ? 'text-dark' : 'text-muted'">Titre</div>
        <div class="small text-muted mt-1" th:text="${n.message}">Message</div>
        <div class="small text-muted mt-1">
          <i class="bi bi-clock me-1"></i>
          <span th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy à HH:mm')}">—</span>
        </div>
      </div>

      <div class="d-flex flex-column align-items-end gap-1">
        <span th:if="${!n.lue}" class="badge" style="background:var(--bolas-accent);color:#fff;font-size:.65rem;">Nouveau</span>
        <a th:if="${n.lienAction != null}" th:href="${n.lienAction}"
           class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-arrow-right"></i>
        </a>
      </div>
    </div>
  </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
