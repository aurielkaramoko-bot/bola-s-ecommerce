<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Espace Vendeur — BOLA</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-5 flex-grow-1" style="max-width:520px;">

  <div class="text-center mb-4">
    <div style="width:64px;height:64px;background:var(--bolas-accent);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;">
      <i class="bi bi-shop-window" style="font-size:1.8rem;color:#fff;"></i>
    </div>
    <h1 class="h3 fw-bold mb-1" style="color:var(--bolas-accent);">Espace Vendeur</h1>
    <p class="text-muted small">Connectez-vous à votre boutique BOLA</p>
  </div>

  <div th:if="${flashError}" class="alert alert-danger d-flex align-items-center gap-2" th:text="${flashError}"></div>
  <div th:if="${flashOk}" class="alert alert-success" th:text="${flashOk}"></div>

  <div class="admin-card p-4 mb-3">
    <form th:action="@{/vendor/login-process}" method="post" id="vendor-login-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="mb-3">
        <label for="username" class="form-label fw-semibold small">Nom d'utilisateur / Boutique</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0">
            <i class="bi bi-person" style="color:var(--bolas-accent);"></i>
          </span>
          <input type="text" class="form-control border-start-0 ps-0"
                 id="username" name="username" required autofocus
                 placeholder="Votre identifiant vendeur"/>
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label fw-semibold small">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0">
            <i class="bi bi-lock" style="color:var(--bolas-accent);"></i>
          </span>
          <input type="password" class="form-control border-start-0 ps-0"
                 id="password" name="password" required
                 placeholder="••••••••"/>
        </div>
      </div>

      <button type="submit" id="btn-vendor-login" class="btn btn-hero-solid w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Accéder à ma boutique
      </button>
    </form>
  </div>

  <!-- Séparateur -->
  <div class="d-flex align-items-center gap-2 my-3">
    <hr class="flex-grow-1 m-0"/>
    <span class="text-muted small px-2">Nouveau sur BOLA ?</span>
    <hr class="flex-grow-1 m-0"/>
  </div>

  <!-- CTA inscription -->
  <div class="admin-card p-4 text-center">
    <i class="bi bi-rocket-takeoff" style="font-size:2rem;color:var(--bolas-accent);"></i>
    <h2 class="h6 fw-bold mt-2 mb-1">Ouvrez votre boutique gratuitement</h2>
    <p class="text-muted small mb-3">Rejoignez des centaines de vendeurs sur la marketplace du Togo.</p>
    <a th:href="@{/vendor/register}" id="btn-open-shop" class="btn btn-outline-secondary w-100">
      <i class="bi bi-shop me-1"></i>Ouvrir ma boutique
    </a>
  </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
