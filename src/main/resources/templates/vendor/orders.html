<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Commandes vendeurs — Bola's</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container py-4 flex-grow-1">

  <!-- Header -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <a th:href="@{/vendor/dashboard}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i>
    </a>
    <div>
      <h1 class="h4 fw-bold mb-0" style="color:var(--bolas-accent);">
        <i class="bi bi-receipt me-2"></i>Mes commandes
      </h1>
      <p class="text-muted small mb-0"
         th:text="'Boutique : ' + ${vendor.displayName}">Boutique</p>
    </div>
  </div>

  <div th:if="${flashOk}" class="alert alert-success" th:text="${flashOk}"></div>
  <div th:if="${flashError}" class="alert alert-danger" th:text="${flashError}"></div>

  <!-- Commandes à préparer -->
  <h2 class="h5 fw-semibold mb-3" style="color:var(--bolas-accent);">
    <i class="bi bi-clock me-2"></i>À préparer
    <span class="badge ms-1" style="background:var(--bolas-accent);font-size:.8rem;"
          th:text="${toProcess.size()}">0</span>
  </h2>

  <div th:if="${toProcess.isEmpty()}" class="admin-card p-4 text-center text-muted mb-4">
    <i class="bi bi-check2-all" style="font-size:2rem;opacity:.4;"></i>
    <p class="mt-2 mb-0">Aucune commande à préparer pour le moment.</p>
  </div>

  <div class="row g-3 mb-4" th:if="${!toProcess.isEmpty()}">
    <div class="col-12 col-md-6" th:each="o : ${toProcess}">
      <div class="admin-card p-3">
        <div class="d-flex align-items-start justify-content-between mb-2">
          <div>
            <span class="fw-bold small" th:text="'#' + ${o.trackingNumber}">—</span>
            <span class="badge bg-warning text-dark ms-1">Confirmée</span>
          </div>
          <span class="small text-muted"
                th:text="${#temporals.format(o.createdAt,'dd/MM HH:mm')}">—</span>
        </div>
        <div class="small mb-1">
          <i class="bi bi-person me-1"></i>
          <span th:text="${o.customerName}">—</span>
        </div>
        <div class="small text-muted mb-2">
          <i class="bi bi-telephone me-1"></i>
          <span th:text="${o.customerPhone}">—</span>
        </div>
        <div class="fw-bold small mb-3" style="color:var(--bolas-accent);"
             th:text="${#numbers.formatInteger(o.totalAmountCfa,1,'COMMA')} + ' FCFA'">—</div>

        <!-- Lignes commande -->
        <ul class="list-unstyled small mb-3" th:if="${!o.lines.isEmpty()}">
          <li th:each="l : ${o.lines}" class="d-flex justify-content-between text-muted mb-1">
            <span th:text="${l.quantity} + ' × ' + ${l.product?.name}">—</span>
            <span th:text="${#numbers.formatInteger(l.unitPriceCfa,1,'COMMA')} + ' F'">—</span>
          </li>
        </ul>

        <!-- Action -->
        <form th:action="@{/vendor/orders/{id}/ready(id=${o.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-hero-solid btn-sm w-100">
            <i class="bi bi-check-circle me-1"></i>Marquer comme prête
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Commandes prêtes -->
  <h2 class="h5 fw-semibold mb-3" style="color:var(--bolas-accent);">
    <i class="bi bi-bag-check me-2"></i>Prêtes à l'envoi
    <span class="badge bg-success ms-1" style="font-size:.8rem;"
          th:text="${done.size()}">0</span>
  </h2>

  <div th:if="${done.isEmpty()}" class="admin-card p-4 text-center text-muted">
    <i class="bi bi-bag" style="font-size:2rem;opacity:.4;"></i>
    <p class="mt-2 mb-0">Aucune commande prête en attente de livraison.</p>
  </div>

  <div class="row g-3" th:if="${!done.isEmpty()}">
    <div class="col-12 col-md-6" th:each="o : ${done}">
      <div class="admin-card p-3 border-start border-success border-3">
        <div class="d-flex justify-content-between mb-1">
          <span class="fw-bold small" th:text="'#' + ${o.trackingNumber}">—</span>
          <span class="badge bg-success">Prête</span>
        </div>
        <div class="small text-muted" th:text="${o.customerName}">—</div>
        <div class="fw-bold small mt-1" style="color:var(--bolas-accent);"
             th:text="${#numbers.formatInteger(o.totalAmountCfa,1,'COMMA')} + ' FCFA'">—</div>
      </div>
    </div>
  </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
