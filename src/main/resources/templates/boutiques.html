<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/header :: head(title=${pageTitle})}">
  <title>Boutiques — BOLA</title>
</head>
<body class="bolas-body">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container py-5 flex-grow-1">
  <h1 class="h2 section-title mb-1">Nos boutiques</h1>
  <p class="section-subtitle mb-4">Découvrez tous les vendeurs actifs sur BOLA</p>

  <div class="row g-4" th:if="${vendors != null and !vendors.isEmpty()}">
    <div class="col-6 col-md-4 col-lg-3" th:each="v : ${vendors}">
      <a th:href="@{/boutiques/{id}(id=${v.id})}" class="text-decoration-none">
        <div class="admin-card p-3 text-center h-100" style="transition:.2s;cursor:pointer;"
             onmouseover="this.style.transform='translateY(-4px)'"
             onmouseout="this.style.transform='none'">
          <!-- Logo / photo boutique -->
          <div class="mb-3" style="position:relative;display:inline-block;">
            <img th:if="${v.logoUrl != null}" th:src="${v.logoUrl}"
                 th:alt="${v.displayName}"
                 style="width:80px;height:80px;object-fit:cover;border-radius:50%;border:3px solid var(--bolas-accent);"/>
            <div th:if="${v.logoUrl == null}"
                 style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#8B5E3C,#C49A6C);display:inline-flex;align-items:center;justify-content:center;">
              <i class="bi bi-shop-window" style="font-size:2rem;color:#fff;"></i>
            </div>
            <!-- Badge plan -->
            <span th:if="${v.plan != null and v.plan.name() == 'PREMIUM'}"
                  style="position:absolute;bottom:0;right:0;background:#C49A6C;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.65rem;"
                  title="Vendeur Premium">⭐</span>
          </div>
          <h2 class="h6 fw-bold mb-1" style="color:var(--bolas-accent);"
              th:text="${v.displayName}">Boutique</h2>
          <p class="small text-muted mb-2" th:if="${v.shopDescription != null}"
             th:text="${#strings.abbreviate(v.shopDescription, 60)}">Description</p>
          <span class="badge bg-success small">Actif</span>
        </div>
      </a>
    </div>
  </div>

  <div th:if="${vendors == null or vendors.isEmpty()}" class="text-center py-5 text-muted">
    <i class="bi bi-shop fs-1 d-block mb-3 opacity-25"></i>
    <p>Aucune boutique active pour l'instant.</p>
  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/footer :: bootstrap-scripts}"></th:block>
</body>
</html>
