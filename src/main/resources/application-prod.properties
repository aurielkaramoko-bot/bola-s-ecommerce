# Production — activer avec: spring.profiles.active=prod
spring.application.name=bolas-ecommerce
spring.thymeleaf.cache=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
# Accélération démarrage Hibernate sur PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
server.forward-headers-strategy=framework
server.port=${PORT:10000}

# Secrets via variables d'environnement uniquement
google.maps.api.key=${GOOGLE_MAPS_API_KEY:AIzaSyAxUykuAg1oqCzYYbO3GkK-HZ1kTFjWzPY}
bolas.admin.password=${ADMIN_PASSWORD}
bolas.admin.username=${ADMIN_USERNAME:admin}

# Données publiques
whatsapp.number=22870099525
bolas.shop.phone=22870099525
bolas.shop.email=aurielka009@gmail.com
bolas.shop.name=BOLA
bolas.shop.latitude=6.1375
bolas.shop.longitude=1.2123

# Session / cookies
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
# Lax requis pour OAuth2 (Google redirect cross-site — Strict bloque le cookie)
server.servlet.session.cookie.same-site=lax

# HTTPS géré par Render — SSL désactivé côté app
server.ssl.enabled=false
spring.h2.console.enabled=false
server.error.include-stacktrace=never
server.error.include-message=never

# Upload / cloud
bolas.upload.dir=${UPLOAD_PATH:/uploads}
cloudinary.url=${CLOUDINARY_URL:}

# Meta WhatsApp Cloud API — notifications automatiques
meta.whatsapp.token=${META_WHATSAPP_TOKEN:}
meta.whatsapp.phone-id=${META_WHATSAPP_PHONE_ID:}
app.whatsapp.enabled=true

# Configuration des prix des packs (en FCFA)
bolas.pack.price.gratuit=0
bolas.pack.price.pro-local=3000
bolas.pack.price.pro=3000
bolas.pack.price.premium=10000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Logs
logging.level.root=WARN
logging.level.com.bolas=INFO
logging.level.org.springframework.transaction=DEBUG
# Debug OAuth2 (à retirer après confirmation que Google login fonctionne)
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.security.web=INFO