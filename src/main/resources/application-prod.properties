# Production — activer avec: spring.profiles.active=prod
spring.application.name=bolas-ecommerce
spring.thymeleaf.cache=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
server.forward-headers-strategy=framework
server.port=${PORT:8080}

# Secrets via variables d'environnement uniquement
google.maps.api.key=${GOOGLE_MAPS_API_KEY:AIzaSyAxUykuAg1oqCzYYbO3GkK-HZ1kTFjWzPY}
bolas.admin.password=${ADMIN_PASSWORD}
bolas.admin.username=${ADMIN_USERNAME:admin}

# Données publiques
whatsapp.number=22870099525
bolas.shop.phone=22870099525
bolas.shop.email=aurielka009@gmail.com
bolas.shop.name=Bola's Boutique
bolas.shop.latitude=5.3600
bolas.shop.longitude=-3.9903

# Session / cookies
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# HTTPS géré par Render — SSL désactivé côté app
server.ssl.enabled=false
spring.h2.console.enabled=false
server.error.include-stacktrace=never
server.error.include-message=never

# Upload / cloud
bolas.upload.dir=${UPLOAD_PATH:/uploads}
cloudinary.url=${CLOUDINARY_URL:}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Logs
logging.level.root=WARN
logging.level.com.bolas=INFO