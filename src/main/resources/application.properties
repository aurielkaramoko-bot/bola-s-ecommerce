# Bola's -- developpement
spring.application.name=bolas-ecommerce

server.port=8080

# DEV (H2 fichier local)
spring.datasource.url=jdbc:h2:file:./data/bolas
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# create-drop = base vide à chaque arrêt (vos produits / photos en BDD disparaissent au redémarrage).
# Pour garder catalogue et URLs d’images entre deux lancements en local, utilisez : update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# Thymeleaf
spring.thymeleaf.cache=false

# Session 30 min
server.servlet.session.timeout=30m

# Upload photos (max 5 Mo)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
bolas.upload.dir=${UPLOAD_PATH:uploads}

# Google Maps (dev)
google.maps.api.key=${GOOGLE_MAPS_API_KEY:AIzaSyAxUykuAg1oqCzYYbO3GkK-HZ1kTFjWzPY}
bolas.shop.latitude=5.3600
bolas.shop.longitude=-3.9903
bolas.shop.name=BOLA

# WhatsApp et telephone admin
whatsapp.number=22870099525
bolas.shop.phone=22870099525
# Email affiché (section contact + footer si vous ajoutez le lien)
bolas.shop.email=aurielka009@gmail.com

# Force l'utilisation des variables d'environnement (enlève les valeurs par défaut pour tester)
bolas.admin.username=${ADMIN_USERNAME:admin}
bolas.admin.password=${ADMIN_PASSWORD:admin123}

# Cloudinary (préparation prod)
cloudinary.url=${CLOUDINARY_URL:}
# Audit log
logging.level.AUDIT=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{0}] %msg%n

# Logs dans un fichier
logging.file.name=logs/bolas-audit.log
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=30

# Meta WhatsApp API (lire depuis env vars )
meta.whatsapp.token=${META_WHATSAPP_TOKEN:}
meta.whatsapp.phone-id=${META_WHATSAPP_PHONE_ID:}



